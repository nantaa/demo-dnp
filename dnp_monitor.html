function NotificationsPanel({ jobs, onClose, onSelectJob }) {
  const items = useMemo(() => {
    const notifs = [];
    jobs.forEach(j => {
      // SLA Breach Escalation - khusus untuk Manager (Penanggung jawab SOP)
      const stageInfo = STAGES.find(s => s.id === j.stage);
      if (stageInfo?.sla && !j.completed_at) {
        const sla = j.stage === 5 ? stageInfo.sla * (j.units || 1) : stageInfo.sla;
        const days = daysBetween(j.stage_started_at, today());
        const breach = days - sla;
        // Major breach: lebih dari 2x SLA
        if (breach > sla) {
          notifs.push({
            type: 'sla_major_breach', icon: AlertTriangle, color: 'var(--bad)',
            title: `⚠⚠ SLA BREACH BESAR: ${j.kode}`,
            desc: `${j.klien} · ${stageInfo.name} · SLA ${sla}h, sudah ${days}h (${breach} hari lewat batas). Eskalasi ke Manager.`,
            job: j
          });
        }
      }
      // Marketing minta revert ke Stage 1
      if (j.revert_requested && j.stage >= 2) {
        notifs.push({
          type: 'revert_requested', icon: RotateCcw, color: 'var(--warn)',
          title: `Marketing minta revert: ${j.kode}`,
          desc: `${j.klien} · oleh ${j.revert_requested.by} — "${j.revert_requested.reason}"`,
          job: j
        });
      }
      // H-5 pending (Stage 3 with ST issued but H-5 not confirmed)
      if (j.stage === 3 && j.no_surat_tugas && !j.h5_confirmed) {
        notifs.push({
          type: 'h5_pending', icon: Bell, color: 'var(--bad)',
          title: `H-5 Teman K3 belum dikonfirmasi: ${j.kode}`,
          desc: `${j.klien} · ST terbit, tunggu konfirmasi H-5 sebelum pelaksanaan`,
          job: j
        });
      }
      // Peer review pending (Stage 5)
      if (j.stage === 5 && j.peer_review_status === 'submitted') {
        notifs.push({
          type: 'review_pending', icon: FileCheck, color: 'var(--info)',
          title: `Peer Review menunggu approval: ${j.kode}`,
          desc: `${j.klien} · Submitted oleh ${j.peer_review_submitted_by} (${formatDate(j.peer_review_submitted_at)})`,
          job: j
        });
      }
      // Follow-up Disnaker jatuh tempo (Stage 6)
      if (j.stage === 6 && j.tgl_submit_disnaker) {
        const lastFu = j.disnaker_followups?.[j.disnaker_followups.length - 1];
        const ref = lastFu ? lastFu.ts.slice(0, 10) : j.tgl_submit_disnaker;
        const daysSince = daysBetween(ref, today());
        if (daysSince >= 7) {
          notifs.push({
            type: 'fu_due', icon: Bell, color: 'var(--bad)',
            title: `Follow-up Disnaker JATUH TEMPO: ${j.kode}`,
            desc: `${j.klien} · ${daysSince} hari sejak ${lastFu ? 'follow-up terakhir' : 'submit'}`,
            job: j
          });
        }
      }
      const status = jobStatus(j);
      if (status === 'overdue') {
        const s = STAGES.find(x => x.id === j.stage);
        const days = daysBetween(j.stage_started_at, today());
        const sla = j.stage === 5 ? s.sla * (j.units || 1) : s.sla;
        notifs.push({
          type: 'overdue', icon: AlertTriangle, color: 'var(--bad)',
          title: `${j.kode} overdue di ${s.name}`,
          desc: `${j.klien} · SLA ${sla} hari, sudah ${days} hari`,
          job: j
        });
      } else if (status === 'warning') {
        const s = STAGES.find(x => x.id === j.stage);
        notifs.push({
          type: 'warning', icon: Clock, color: 'var(--warn)',
          title: `${j.kode} mendekati deadline`,
          desc: `${j.klien} · ${s.name}`,
          job: j
        });
      }
      const ss = suketStatus(j);
      if (ss === 'expired') {
        notifs.push({
          type: 'suket_expired', icon: ShieldCheck, color: 'var(--bad)',
          title: `Suket EXPIRED: ${j.kode}`,
          desc: `${j.klien} · Hubungi klien untuk re-inspeksi`,
          job: j
        });
      } else if (ss === 'expiring_soon') {
        const days = daysBetween(today(), j.suket_expired_at);
        notifs.push({
          type: 'suket_expiring', icon: ShieldCheck, color: 'var(--warn)',
          title: `Suket akan expire (${days} hari): ${j.kode}`,
          desc: `${j.klien} · Schedule re-inspeksi`,
          job: j
        });
      }
    });
    return notifs;
  }, [jobs]);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-content fadein" onClick={e => e.stopPropagation()} style={{ maxWidth: 600 }}>
        <div style={{ padding: '20px 28px', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Notifications</div>
            <div className="dnp-serif" style={{ fontSize: 22, fontWeight: 500, marginTop: 2 }}>Alert & Reminder</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><X size={16} /></button>
        </div>
        <div style={{ padding: 20, overflowY: 'auto', flex: 1 }}>
          {items.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink-soft)' }}>
              <CheckCircle2 size={32} style={{ margin: '0 auto 12px', color: 'var(--ok)' }} />
              <div>Tidak ada alert. Semua job on-track.</div>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {items.map((n, i) => {
                const Icon = n.icon;
                return (
                  <div key={i} onClick={() => { onSelectJob(n.job); onClose(); }} className="row-hover"
                    style={{ padding: 12, border: '1px solid var(--line-soft)', display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                    <div style={{ width: 32, height: 32, background: n.color, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <Icon size={16} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{n.title}</div>
                      <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>{n.desc}</div>
                    </div>
                    <ChevronRight size={14} style={{ color: 'var(--ink-faint)', marginTop: 6, flexShrink: 0 }} />
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ROOT APP
// ============================================================

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('dashboard');
  const [jobs, setJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState(null);
  const [showNotif, setShowNotif] = useState(false);
  const [showNewJob, setShowNewJob] = useState(false);
  const [loading, setLoading] = useState(true);

  // Initial load
  useEffect(() => {
    (async () => {
      await seedDemoData(); // Only seeds if empty
      const savedUser = await safeGet('app:user');
      const loadedJobs = await loadAllJobs();
      setUser(savedUser);
      setJobs(loadedJobs);
      setLoading(false);
    })();
  }, []);

  // Refresh selected job when jobs list updates
  useEffect(() => {
    if (selectedJob) {
      const fresh = jobs.find(j => j.id === selectedJob.id);
      if (fresh && fresh !== selectedJob) setSelectedJob(fresh);
      if (!fresh) setSelectedJob(null);
    }
  }, [jobs]);

  const handleLogin = async (u) => {
    await safeSet('app:user', u);
    setUser(u);
  };

  const handleLogout = async () => {
    await safeDelete('app:user');
    setUser(null);
  };

  const refreshJobs = async () => {
    const loaded = await loadAllJobs();
    setJobs(loaded);
  };

  const handleSaveJob = async (job) => {
    await saveJob(job);
    await refreshJobs();
  };

  const handleDeleteJob = async (id) => {
    await deleteJob(id);
    setSelectedJob(null);
    await refreshJobs();
  };

  const handleAdvance = async (job) => {
    if (job.stage >= 7) return;
    // GATES per SOP
    if (job.stage === 3 && !job.h5_confirmed) {
      alert('Tidak bisa lanjut ke Pelaksanaan: Surat Pemberitahuan H-5 Teman K3 belum dikonfirmasi.\n\nBuka detail job → tab Penjadwalan → konfirmasi metode pengiriman H-5.');
      return;
    }
    if (job.stage === 5 && job.peer_review_status !== 'approved') {
      alert('Tidak bisa lanjut ke Pengurusan Suket: LHPP & BAP belum disetujui Supervisor.\n\nBuka detail job → tab Evaluasi & Review → submit untuk review, lalu Manager/Kadiv approve.');
      return;
    }
    const nextStage = job.stage + 1;
    const updated = {
      ...job,
      stage: nextStage,
      stage_started_at: today(),
      history: [...(job.history || []), {
        stage: nextStage, ts: today(), by: user.name,
        action: `Pindah ke Tahap ${nextStage}: ${STAGES[nextStage - 1].name}`
      }]
    };
    await saveJob(updated);
    await refreshJobs();
  };

  const handleResetDemo = async () => {
    if (!confirm('Reset semua data ke demo awal? Semua perubahan akan hilang.')) return;
    await clearAllData();
    await seedDemoData();
    setSelectedJob(null);
    await refreshJobs();
  };

  // Handle 'new' menu click
  useEffect(() => {
    if (view === 'new') {
      setShowNewJob(true);
      setView('dashboard');
    }
  }, [view]);

  const overdueCount = useMemo(() => jobs.filter(j => jobStatus(j) === 'overdue').length, [jobs]);

  if (loading) {
    return (
      <div className="dnp-root" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <style>{STYLES}</style>
        <div style={{ color: 'var(--ink-soft)', fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>Loading…</div>
      </div>
    );
  }

  if (!user) {
    return (
      <>
        <style>{STYLES}</style>
        <LoginScreen onLogin={handleLogin} />
      </>
    );
  }

  return (
    <div className="dnp-root">
      <style>{STYLES}</style>
      <Header
        user={user}
        onLogout={handleLogout}
        overdueCount={overdueCount}
        onShowNotif={() => setShowNotif(true)}
        onResetDemo={handleResetDemo}
      />
      <div style={{ display: 'flex', minHeight: 'calc(100vh - 65px)' }}>
        <Sidebar view={view} setView={setView} user={user} />
        <main style={{ flex: 1, overflowX: 'auto' }} className="dnp-bg-texture">
          {view === 'dashboard' && <Dashboard jobs={jobs} user={user} onSelectJob={setSelectedJob} setView={setView} />}
          {view === 'kanban'    && <KanbanBoard jobs={jobs} user={user} onSelectJob={setSelectedJob} onAdvance={handleAdvance} />}
          {view === 'list'      && <JobList jobs={jobs} user={user} onSelectJob={setSelectedJob} />}
          {view === 'suket'     && <SuketReminder jobs={jobs} onSelectJob={setSelectedJob} />}
          {view === 'inventory' && <InventoryPage user={user} />}
        </main>
      </div>

      {selectedJob && (
        <JobDetailModal
          job={selectedJob}
          user={user}
          allJobs={jobs}
          onClose={() => setSelectedJob(null)}
          onUpdate={handleSaveJob}
          onDelete={handleDeleteJob}
        />
      )}

      {showNewJob && (
        <NewJobModal
          onClose={() => setShowNewJob(false)}
          onSave={handleSaveJob}
          user={user}
        />
      )}

      {showNotif && (
        <NotificationsPanel
          jobs={jobs}
          onClose={() => setShowNotif(false)}
          onSelectJob={setSelectedJob}
        />
      )}
    </div>
  );
}


  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
})();
</script>
</body>
</html>
