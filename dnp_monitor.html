}

// ============================================================
// STAGE 5 - EVALUATION & PEER REVIEW PANEL (Tim Ahli + Kadiv)
// ============================================================

function EvaluationPanel({ job, user, onUpdate }) {
  // Initialize per-unit evaluations
  const evaluations = useMemo(() => {
    if (job.evaluations && job.evaluations.length === job.units) return job.evaluations;
    return Array.from({ length: job.units }, (_, i) => ({
      unit_no: i + 1,
      unit_label: `Unit ${i + 1}`,
      status: '',     // 'laik' | 'laik_bersyarat' | 'tidak_laik'
      findings: '',
      recommendation: '',
    }));
  }, [job.evaluations, job.units]);

  const [localEvals, setLocalEvals] = useState(evaluations);

  useEffect(() => { setLocalEvals(evaluations); }, [job.id]);

  const reviewStatus = job.peer_review_status || 'draft'; // 'draft' | 'submitted' | 'approved' | 'revision'
  const isInspektur = user.role === 'inspektur';
  const isReviewer = user.role === 'manager';

  // After approval, data is LOCKED - no editing allowed even by manager
  const canEdit = (reviewStatus === 'draft' || reviewStatus === 'revision') && (isInspektur || isReviewer);
  const isLocked = reviewStatus === 'approved';
  const allEvaluated = localEvals.every(e => e.status !== '');
  const hasIssues = localEvals.some(e => e.status === 'tidak_laik' || e.status === 'laik_bersyarat');

  // Aggregate result
  const aggregateLaik = useMemo(() => {
    if (!allEvaluated) return null;
    if (localEvals.every(e => e.status === 'laik')) return 'laik';
    if (localEvals.some(e => e.status === 'tidak_laik')) return 'tidak_laik';
    return 'laik_bersyarat';
  }, [localEvals, allEvaluated]);

  const updateUnit = (idx, field, value) => {
    const next = [...localEvals];
    next[idx] = { ...next[idx], [field]: value };
    setLocalEvals(next);
  };

  const saveDraft = async () => {
    await onUpdate({
      ...job,
      evaluations: localEvals,
      laik_status: aggregateLaik,
    });
  };

  const submitForReview = async () => {
    if (!allEvaluated) {
      alert(`Lengkapi evaluasi semua ${job.units} unit terlebih dahulu.`);
      return;
    }
    const lhppExists = (job.documents || []).some(d => d.type === 'LHPP');
    const bapExists  = (job.documents || []).some(d => d.type === 'BAP');
    if (!lhppExists || !bapExists) {
      if (!confirm(`Dokumen LHPP ${lhppExists ? '✓' : '✗'} dan BAP ${bapExists ? '✓' : '✗'} di tab Dokumen.\n\nLanjut submit untuk peer review?`)) return;
    }
    await onUpdate({
      ...job,
      evaluations: localEvals,
      laik_status: aggregateLaik,
      peer_review_status: 'submitted',
      peer_review_submitted_at: today(),
      peer_review_submitted_by: user.name,
      history: [...(job.history || []), {
        stage: 5, ts: today(), by: user.name,
        action: `LHPP & BAP submit untuk peer review oleh Supervisor. Status agregat: ${aggregateLaik?.toUpperCase().replace('_', ' ')}`
      }]
    });
  };

  const approveReview = async () => {
    if (!confirm('Setujui LHPP & BAP? Job akan lanjut ke Pengurusan Suket (Tahap 6).')) return;
    await onUpdate({
      ...job,
      peer_review_status: 'approved',
      peer_review_approved_at: today(),
      peer_review_approved_by: user.name,
      stage: 6,
      stage_started_at: today(),
      history: [...(job.history || []), {
        stage: 6, ts: today(), by: user.name,
        action: `Peer review DISETUJUI oleh ${user.name}. LHPP & BAP siap dibundel untuk pengajuan Suket ke Disnaker.`
      }]
    });
  };

  const requestRevision = async () => {
    const note = prompt('Catatan revisi untuk Tim Ahli:');
    if (!note?.trim()) return;
    await onUpdate({
      ...job,
      peer_review_status: 'revision',
      peer_review_revision_at: today(),
      peer_review_revision_by: user.name,
      peer_review_revision_note: note,
      history: [...(job.history || []), {
        stage: 5, ts: today(), by: user.name,
        action: `Peer review minta REVISI: ${note}`
      }]
    });
  };

  const statusBadge = (st) => {
    const opt = LAIK_STATUS.find(o => o.value === st);
    if (!opt) return null;
    return <span className={`tag ${opt.tag}`} style={{ fontSize: 10 }}>{opt.label}</span>;
  };

  return (
    <div>
      {/* Header */}
      <div className="panel-soft" style={{ padding: 16, marginBottom: 16, background: 'rgba(194, 65, 12, 0.04)', borderLeft: '3px solid var(--accent)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <FileCheck size={20} style={{ color: 'var(--accent)', flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Evaluasi Kelaikan & Peer Review</div>
              {reviewStatus === 'draft'     && <span className="tag tag-slate" style={{ fontSize: 10 }}>DRAFT</span>}
              {reviewStatus === 'submitted' && <span className="tag tag-info"  style={{ fontSize: 10 }}>MENUNGGU REVIEW</span>}
              {reviewStatus === 'approved'  && <span className="tag tag-ok"    style={{ fontSize: 10 }}>🔒 APPROVED & LOCKED</span>}
              {reviewStatus === 'revision'  && <span className="tag tag-warn"  style={{ fontSize: 10 }}>MINTA REVISI</span>}
            </div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5, marginTop: 4 }}>
              Tim Ahli isi evaluasi LAIK/TIDAK LAIK per unit, lalu submit untuk peer review oleh Supervisor (Kadiv RU/Manager). Hanya yang disetujui yang bisa lanjut ke pengajuan Suket.
            </div>
          </div>
        </div>
      </div>

      {/* Revision note from reviewer */}
      {reviewStatus === 'revision' && job.peer_review_revision_note && (
        <div className="panel-soft" style={{ padding: 14, marginBottom: 16, background: 'rgba(180,83,9,0.06)', borderLeft: '3px solid var(--warn)' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--warn)', marginBottom: 4 }}>📝 CATATAN REVISI dari {job.peer_review_revision_by} ({formatDate(job.peer_review_revision_at)})</div>
          <div style={{ fontSize: 13 }}>{job.peer_review_revision_note}</div>
        </div>
      )}

      {/* Locked banner after approval */}
      {isLocked && (
        <div className="panel-soft" style={{ padding: 14, marginBottom: 16, background: 'rgba(21,128,61,0.06)', borderLeft: '3px solid var(--ok)' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
            <ShieldCheck size={18} style={{ color: 'var(--ok)', flexShrink: 0, marginTop: 2 }} />
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ok)' }}>🔒 LHPP & BAP telah Approved & Locked</div>
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 4, lineHeight: 1.5 }}>
                Disetujui oleh <strong>{job.peer_review_approved_by}</strong> pada {formatDate(job.peer_review_approved_at)}. Data evaluasi dan status kelaikan tidak dapat diubah lagi untuk menjaga integritas dokumen yang diajukan ke Disnaker.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Per-Unit Evaluation Table */}
      <div className="panel-soft" style={{ marginBottom: 16 }}>
        <div style={{ padding: '10px 14px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            Evaluasi Per Unit ({job.units} unit)
          </div>
          {allEvaluated && aggregateLaik && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Status Agregat:</span>
              {statusBadge(aggregateLaik)}
            </div>
          )}
        </div>
        {localEvals.map((ev, idx) => (
          <div key={idx} style={{ padding: 14, borderBottom: idx < localEvals.length - 1 ? '1px solid var(--line-soft)' : 'none' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr 160px', gap: 12, alignItems: 'flex-start' }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>Unit</div>
                <input
                  className="inp" value={ev.unit_label}
                  onChange={e => updateUnit(idx, 'unit_label', e.target.value)}
                  disabled={!canEdit}
                  style={{ marginTop: 4, fontSize: 12, padding: '4px 8px' }} />
              </div>
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                  <div>
                    <div style={{ fontSize: 11, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>Temuan</div>
                    <textarea className="inp" rows="2" value={ev.findings} onChange={e => updateUnit(idx, 'findings', e.target.value)} disabled={!canEdit}
                      placeholder="Misal: korosi pada pipa drain, indikator tekanan tidak akurat..."
                      style={{ marginTop: 4, fontSize: 12, padding: '4px 8px', resize: 'vertical', fontFamily: 'Geist, sans-serif' }} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>Rekomendasi</div>
                    <textarea className="inp" rows="2" value={ev.recommendation} onChange={e => updateUnit(idx, 'recommendation', e.target.value)} disabled={!canEdit}
                      placeholder="Misal: ganti pressure gauge, cleaning per 6 bulan..."
                      style={{ marginTop: 4, fontSize: 12, padding: '4px 8px', resize: 'vertical', fontFamily: 'Geist, sans-serif' }} />
                  </div>
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, marginBottom: 4 }}>Status</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {LAIK_STATUS.map(opt => (
                    <button key={opt.value}
                      onClick={() => canEdit && updateUnit(idx, 'status', opt.value)}
                      disabled={!canEdit}
                      className="btn btn-sm"
                      style={{
                        justifyContent: 'flex-start',
                        background: ev.status === opt.value ? opt.color : 'transparent',
                        color: ev.status === opt.value ? 'white' : opt.color,
                        borderColor: opt.color,
                        padding: '4px 8px', fontSize: 11,
                        opacity: !canEdit && ev.status !== opt.value ? 0.3 : 1,
                      }}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Action buttons - context dependent */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
        <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
          {!allEvaluated && `${localEvals.filter(e => e.status).length}/${job.units} unit dievaluasi`}
          {allEvaluated && reviewStatus === 'draft' && 'Semua unit dievaluasi. Siap submit untuk review.'}
          {reviewStatus === 'submitted' && `Disubmit oleh ${job.peer_review_submitted_by} pada ${formatDate(job.peer_review_submitted_at)}`}
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {canEdit && (
            <button className="btn" onClick={saveDraft}>Simpan Draft</button>
          )}
          {canEdit && isInspektur && (
            <button className="btn btn-primary" onClick={submitForReview} disabled={!allEvaluated}>
              <Upload size={12} /> Submit untuk Peer Review
            </button>
          )}
          {reviewStatus === 'submitted' && isReviewer && (
            <>
              <button className="btn btn-danger" onClick={requestRevision}>
                <RotateCcw size={12} /> Reject / Perlu Revisi
              </button>
              <button className="btn btn-primary" onClick={approveReview}>
                <ShieldCheck size={12} /> Approve & Lock · Lanjut Suket
              </button>
            </>
          )}
          {reviewStatus === 'submitted' && !isReviewer && (
            <span style={{ fontSize: 11, color: 'var(--ink-soft)', fontStyle: 'italic' }}>Menunggu approval dari Manager/Kadiv RU</span>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// UNIT ACTION MODAL - For submit/issue per unit at Stage 6
// ============================================================

function UnitActionModal({ job, unitsTracking, activeUnitId, onClose, onSubmit, onIssue, defaultValidityMonths }) {
  const isBatchSubmit = activeUnitId === 'batch_submit';
  const isSingleSubmit = activeUnitId?.startsWith('submit_');
  const isIssue = activeUnitId?.startsWith('issue_');

  const singleUnitNo = (isSingleSubmit || isIssue)
    ? parseInt(activeUnitId.split('_')[1])
    : null;
  const singleUnit = singleUnitNo ? unitsTracking.find(u => u.unit_no === singleUnitNo) : null;
  const pendingUnits = unitsTracking.filter(u => u.status === 'pending');

  // Submit state
  const [submitDate, setSubmitDate] = useState(today());
  const [regNo, setRegNo] = useState('');
  const [selectedUnitNos, setSelectedUnitNos] = useState(
    isBatchSubmit ? pendingUnits.map(u => u.unit_no) : (isSingleSubmit ? [singleUnitNo] : [])
  );

  // Issue state
  const [noSuket, setNoSuket] = useState('');
  const [tglTerbit, setTglTerbit] = useState(today());
  const [validityMonths, setValidityMonths] = useState(defaultValidityMonths);
  const [pvType, setPvType] = useState('luar'); // for PV: 'luar' (24mo) or 'hydrotest' (60mo)

  // Update validity when PV type changes
  useEffect(() => {
    if (job.pesawat === 'PV' && isIssue) {
      setValidityMonths(pvType === 'hydrotest' ? 60 : 24);
    }
  }, [pvType, job.pesawat, isIssue]);

  const toggleUnit = (unitNo) => {
    setSelectedUnitNos(prev =>
      prev.includes(unitNo) ? prev.filter(x => x !== unitNo) : [...prev, unitNo]
    );
  };

  const handleSubmit = async () => {
    if (selectedUnitNos.length === 0) {
      alert('Pilih minimal 1 unit untuk di-submit.');
      return;
    }
    if (!submitDate) {
      alert('Mohon isi tanggal submit.');
      return;
    }
    await onSubmit(selectedUnitNos, submitDate, regNo);
    onClose();
  };

  const handleIssue = async () => {
    if (!noSuket.trim()) {
      alert('Mohon isi No. Suket dari Disnaker.');
      return;
    }
    if (!tglTerbit) {
      alert('Mohon isi tanggal terbit Suket.');
      return;
    }
    await onIssue(singleUnitNo, { noSuket: noSuket.trim(), tglTerbit, validityMonths: Number(validityMonths) });
    onClose();
  };

  // Calc preview expiry
  const previewExp = useMemo(() => {
    if (!tglTerbit) return null;
    const d = new Date(tglTerbit);
    d.setMonth(d.getMonth() + Number(validityMonths));
    return d.toISOString().slice(0, 10);
  }, [tglTerbit, validityMonths]);

  return (
    <div className="modal-backdrop" onClick={onClose} style={{ zIndex: 70 }}>
      <div className="modal-content fadein" onClick={e => e.stopPropagation()} style={{ maxWidth: 600 }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--line)' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            {isIssue ? 'Suket Terbit' : 'Submit ke Disnaker'}
          </div>
          <div className="dnp-serif" style={{ fontSize: 22, fontWeight: 500, marginTop: 2 }}>
            {isBatchSubmit && `Batch Submit ${pendingUnits.length} Unit`}
            {isSingleSubmit && `Submit Unit ${singleUnit?.unit_label}`}
            {isIssue && `Input Suket: ${singleUnit?.unit_label}`}
          </div>
        </div>

        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>
          {(isBatchSubmit || isSingleSubmit) && (
            <>
              {isBatchSubmit && (
                <div style={{ marginBottom: 16 }}>
                  <label className="inp-label">Pilih Unit yang Akan Di-submit ({selectedUnitNos.length} dipilih)</label>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginTop: 6 }}>
                    {pendingUnits.map(u => {
                      const isSel = selectedUnitNos.includes(u.unit_no);
                      const laikOpt = LAIK_STATUS.find(o => o.value === u.laik_status);
                      return (
                        <div key={u.unit_no} onClick={() => toggleUnit(u.unit_no)}
                          style={{
                            padding: 10, border: '1px solid ' + (isSel ? 'var(--accent)' : 'var(--line-soft)'),
                            background: isSel ? 'rgba(194,65,12,0.06)' : 'var(--bg-card)',
                            cursor: 'pointer', display: 'flex', gap: 8, alignItems: 'center'
                          }}>
                          <div style={{
                            width: 16, height: 16, border: '2px solid ' + (isSel ? 'var(--accent)' : 'var(--line)'),
                            background: isSel ? 'var(--accent)' : 'transparent',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
                          }}>
                            {isSel && <CheckCircle2 size={10} style={{ color: 'white' }} />}
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 12, fontWeight: 600 }}>#{u.unit_no} {u.unit_label}</div>
                            {laikOpt && <span className={`tag ${laikOpt.tag}`} style={{ fontSize: 9, marginTop: 2 }}>{laikOpt.label}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div>
                  <label className="inp-label">Tanggal Submit *</label>
                  <input className="inp" type="date" value={submitDate} onChange={e => setSubmitDate(e.target.value)} />
                </div>
                <div>
                  <label className="inp-label">No. Registrasi Disnaker</label>
                  <input className="inp" value={regNo} onChange={e => setRegNo(e.target.value)} placeholder="(opsional, jika ada)" />
                </div>
              </div>

              <div style={{ marginTop: 16, padding: 12, background: 'var(--bg-deep)', fontSize: 11, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
                💡 Unit yang sudah di-submit akan masuk antrian Disnaker dan tidak bisa diubah sampai Disnaker memberikan keputusan (terbit atau ditolak). Pastikan bundel dokumen sudah lengkap sebelum submit.
              </div>
            </>
          )}

          {isIssue && (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 12 }}>
                <div>
                  <label className="inp-label">No. Suket dari Disnaker *</label>
                  <input className="inp" value={noSuket} onChange={e => setNoSuket(e.target.value)} placeholder="SK.123/DISNAKER/JABAR/2026" />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <div>
                    <label className="inp-label">Tanggal Terbit Suket *</label>
                    <input className="inp" type="date" value={tglTerbit} onChange={e => setTglTerbit(e.target.value)} />
                  </div>
                  <div>
                    <label className="inp-label">Masa Berlaku (bulan)</label>
                    <input className="inp" type="number" min="1" value={validityMonths} onChange={e => setValidityMonths(e.target.value)} />
                    <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 4 }}>
                      Default: {defaultValidityMonths} bulan ({defaultValidityMonths >= 12 ? `${defaultValidityMonths / 12} tahun` : `${defaultValidityMonths} bulan`})
                    </div>
                  </div>
                </div>

                {job.pesawat === 'PV' && (
                  <div style={{ padding: 12, background: 'rgba(30,58,138,0.04)', borderLeft: '3px solid var(--info)' }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--info)', marginBottom: 6 }}>📋 Jenis Pemeriksaan Bejana Tekan (Permenaker 37/2016)</div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button className="btn btn-sm" onClick={() => setPvType('luar')}
                        style={{
                          flex: 1, justifyContent: 'center',
                          background: pvType === 'luar' ? 'var(--info)' : 'transparent',
                          color: pvType === 'luar' ? 'white' : 'var(--info)',
                          borderColor: 'var(--info)',
                        }}>
                        Pemeriksaan Luar (2 tahun)
                      </button>
                      <button className="btn btn-sm" onClick={() => setPvType('hydrotest')}
                        style={{
                          flex: 1, justifyContent: 'center',
                          background: pvType === 'hydrotest' ? 'var(--info)' : 'transparent',
                          color: pvType === 'hydrotest' ? 'white' : 'var(--info)',
                          borderColor: 'var(--info)',
                        }}>
                        Pemeriksaan Dalam / Hydrotest (5 tahun)
                      </button>
                    </div>
                  </div>
                )}

                {/* Auto-calc preview */}
                {previewExp && (
                  <div style={{ padding: 12, background: 'rgba(21,128,61,0.06)', borderLeft: '3px solid var(--ok)' }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ok)', marginBottom: 4 }}>📅 Masa Berlaku Otomatis Ter-hitung</div>
                    <div style={{ fontSize: 13, color: 'var(--ink)' }}>
                      Suket berlaku dari <strong>{formatDate(tglTerbit)}</strong> sampai <strong>{formatDate(previewExp)}</strong>
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4 }}>
                      = {validityMonths} bulan ({validityMonths >= 12 ? `${validityMonths / 12} tahun` : `${validityMonths} bulan`}). Otomatis masuk database Reminder Suket dengan alert H-90.
                    </div>
                  </div>
                )}
              </div>
            </>
          )}
        </div>

        <div style={{ padding: '14px 24px', borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="btn" onClick={onClose}>Batal</button>
          {(isBatchSubmit || isSingleSubmit) && (
            <button className="btn btn-primary" onClick={handleSubmit}>
              <Upload size={12} /> Submit {selectedUnitNos.length > 1 ? `${selectedUnitNos.length} Unit` : ''}
            </button>
          )}
          {isIssue && (
            <button className="btn btn-primary" onClick={handleIssue}>
              <ShieldCheck size={12} /> Simpan Suket
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// STAGE 6 - DISNAKER TRACKING PANEL
// ============================================================

function DisnakerTrackingPanel({ job, user, onUpdate }) {
  const [submitDate, setSubmitDate] = useState(today());
  const [noReg, setNoReg] = useState('');
  const [showLogModal, setShowLogModal] = useState(false);
  const [followupStatus, setFollowupStatus] = useState('progress');
  const [followupNote, setFollowupNote] = useState('');
  const [activeUnitId, setActiveUnitId] = useState(null); // which unit is being managed
  const [showSuketModal, setShowSuketModal] = useState(false);

  // Auto-initialize units_tracking array on first render at Stage 6
  useEffect(() => {
    if (job.stage !== 6) return;
    if (job.units_tracking && job.units_tracking.length === job.units) return;
    // Initialize from evaluations if available, else fresh
    const newTracking = Array.from({ length: job.units }, (_, i) => {
      const eval_ = (job.evaluations || []).find(e => e.unit_no === i + 1);
      return {
        unit_no: i + 1,
        unit_label: eval_?.unit_label || `Unit ${i + 1}`,
        laik_status: eval_?.status || 'laik',
        status: 'pending',          // pending | submitted | issued | rejected
        tgl_submit: null,
        no_registrasi: null,
        no_suket: null,
        tgl_suket: null,
        suket_expired_at: null,
        suket_validity_months: null,
        notes: '',
      };
    });
    onUpdate({ ...job, units_tracking: newTracking });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const unitsTracking = job.units_tracking || [];
  const followups = job.disnaker_followups || [];
  const bundleCheck = job.bundle_check || {};

  // Aggregate status across units
  const unitsAggregate = useMemo(() => {
    if (unitsTracking.length === 0) return { pending: 0, submitted: 0, issued: 0, rejected: 0, total: 0 };
    return {
      pending:   unitsTracking.filter(u => u.status === 'pending').length,
      submitted: unitsTracking.filter(u => u.status === 'submitted').length,
      issued:    unitsTracking.filter(u => u.status === 'issued').length,
      rejected:  unitsTracking.filter(u => u.status === 'rejected').length,
      total:     unitsTracking.length,
    };
  }, [unitsTracking]);

  const allUnitsIssued = unitsTracking.length > 0 && unitsTracking.every(u => u.status === 'issued');
  const anyUnitSubmitted = unitsTracking.some(u => u.status === 'submitted' || u.status === 'issued');

  // Update a single unit
  const updateUnit = async (unitNo, patch) => {
    const updated = unitsTracking.map(u => u.unit_no === unitNo ? { ...u, ...patch } : u);
    await onUpdate({ ...job, units_tracking: updated });
  };

  // Bundle Document Checklist - mengadopsi FM-PJK3-RIKU-009
  const BUNDLE_CHECKLIST = [
    // A. Dokumen dari Client
    { group: 'A', id: 'b_permohonan',  label: 'Surat Permohonan ke Disnaker (asli, bermaterai)', sourceDoc: 'Surat Permohonan' },
    { group: 'A', id: 'b_kuasa',       label: 'Surat Kuasa dari Pemilik ke PJK3 (asli, bermaterai)', sourceDoc: 'Surat Kuasa' },
    { group: 'A', id: 'b_keabsahan',   label: 'Surat Pernyataan Keabsahan Data (asli, bermaterai)', sourceDoc: 'Pernyataan Keabsahan' },
    { group: 'A', id: 'b_form',        label: 'Form Checklist Disnaker (diisi & TTD client)', sourceDoc: 'Form Checklist Klien' },
    { group: 'A', id: 'b_drawing',     label: 'Drawing / Gambar Teknis (as-built)', sourceDoc: 'Drawing/As-Built' },
    { group: 'A', id: 'b_manual',      label: 'Manual Book / Spesifikasi Teknis', sourceDoc: 'Manual Book' },
    { group: 'A', id: 'b_pengesahan',  label: 'Pengesahan Gambar dari Kemnaker (jika wajib)', sourceDoc: 'Pengesahan Gambar Kemnaker', conditional: true },
    { group: 'A', id: 'b_suket_lama',  label: 'Copy Suket / Sertifikat Lama (untuk perpanjangan)', sourceDoc: 'Copy Suket Lama' },
    // B. Dokumen dari PJK3
    { group: 'B', id: 'b_lhpp',        label: 'LHPP (Laporan Hasil Pemeriksaan dan Pengujian)', sourceDoc: 'LHPP' },
    { group: 'B', id: 'b_bap',         label: 'BAP (Berita Acara Pemeriksaan)', sourceDoc: 'BAP' },
    { group: 'B', id: 'b_skp_ahli',    label: 'Copy SKP Ahli K3 yang melakukan pemeriksaan', auto: true },
    { group: 'B', id: 'b_sk_pjk3',     label: 'Copy Sertifikat PJK3 (SK Kemnaker)', auto: true },
    { group: 'B', id: 'b_foto',        label: 'Foto Dokumentasi Pemeriksaan', sourceDoc: 'Foto' },
    { group: 'B', id: 'b_kalibrasi',   label: 'Copy Sertifikat Kalibrasi Alat Ukur', auto: true },
    // C. Kelengkapan Bundel
    { group: 'C', id: 'b_cover',       label: 'Cover Bundel (nama client & jenis pesawat)' },
    { group: 'C', id: 'b_daftarisi',   label: 'Daftar Isi Bundel' },
    { group: 'C', id: 'b_jilid',       label: 'Dokumen dijilid / distaples rapi' },
    { group: 'C', id: 'b_arsip',       label: 'Copy bundel untuk arsip internal' },
  ];

  // Auto-detect document presence based on uploaded docs
  const docExists = (sourceDoc) => {
    if (!sourceDoc) return false;
    return (job.documents || []).some(d =>
      d.type === sourceDoc ||
      (sourceDoc === 'Foto' && (d.type?.startsWith('Foto') || d.mime?.startsWith('image/')))
    );
  };

  // Resolve checklist status
  const bundleStatus = useMemo(() => {
    return BUNDLE_CHECKLIST.map(item => {
      const checked = bundleCheck[item.id];
      const sourceFound = item.auto ? true : (item.sourceDoc ? docExists(item.sourceDoc) : false);
      return { ...item, checked, sourceFound };
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [bundleCheck, job.documents]);

  const groupedBundle = {
    A: bundleStatus.filter(i => i.group === 'A'),
    B: bundleStatus.filter(i => i.group === 'B'),
    C: bundleStatus.filter(i => i.group === 'C'),
  };

  const requiredItems = bundleStatus.filter(i => !i.conditional);
  const checkedRequired = requiredItems.filter(i => i.checked?.status === 'ok').length;
  const allBundleOK = checkedRequired === requiredItems.length;

  const setBundleItem = async (itemId, status) => {
    const next = {
      ...bundleCheck,
      [itemId]: status ? { status, by: user.name, ts: new Date().toISOString() } : undefined
    };
    Object.keys(next).forEach(k => { if (next[k] === undefined) delete next[k]; });
    await onUpdate({ ...job, bundle_check: next });
  };

  // Aging based on earliest unit submitted
  const earliestSubmit = useMemo(() => {
    const submitted = unitsTracking.filter(u => u.tgl_submit).map(u => u.tgl_submit).sort();
    return submitted[0] || null;
  }, [unitsTracking]);

  const daysSinceSubmit = earliestSubmit ? daysBetween(earliestSubmit, today()) : 0;
  const lastFollowup = followups.length > 0 ? followups[followups.length - 1] : null;
  const daysSinceLastFollowup = lastFollowup ? daysBetween(lastFollowup.ts.slice(0, 10), today()) : daysSinceSubmit;
  const followupDue = anyUnitSubmitted && daysSinceLastFollowup >= 7;

  // SUBMIT selected units to Disnaker (can be subset or all)
  const submitUnitsToDisnaker = async (unitNos, tgl, regNo) => {
    if (!tgl || unitNos.length === 0) return;
    if (!allBundleOK) {
      if (!confirm(`Bundel dokumen belum lengkap (${checkedRequired}/${requiredItems.length} wajib OK). Yakin tetap submit ke Disnaker?`)) return;
    }
    const updated = unitsTracking.map(u =>
      unitNos.includes(u.unit_no)
        ? { ...u, status: 'submitted', tgl_submit: tgl, no_registrasi: regNo || null }
        : u
    );
    const unitLabels = unitsTracking.filter(u => unitNos.includes(u.unit_no)).map(u => u.unit_label).join(', ');
    await onUpdate({
      ...job,
      units_tracking: updated,
      tgl_submit_disnaker: job.tgl_submit_disnaker || tgl, // record first submit for aging
      history: [...(job.history || []), {
        stage: 6, ts: today(), by: user.name,
        action: `Submit ${unitNos.length} unit ke Disnaker: ${unitLabels}${regNo ? ` (Reg: ${regNo})` : ''}`
      }]
    });
  };

  // Issue Suket for a specific unit
  const issueSuketForUnit = async (unitNo, suketData) => {
    const { noSuket, tglTerbit, validityMonths } = suketData;
    const expDate = new Date(tglTerbit);
    expDate.setMonth(expDate.getMonth() + validityMonths);
    const tglExp = expDate.toISOString().slice(0, 10);

    const updated = unitsTracking.map(u =>
      u.unit_no === unitNo
        ? { ...u, status: 'issued', no_suket: noSuket, tgl_suket: tglTerbit, suket_expired_at: tglExp, suket_validity_months: validityMonths }
        : u
    );
    const unitLabel = unitsTracking.find(u => u.unit_no === unitNo)?.unit_label;
    const validityLabel = validityMonths >= 12 ? `${validityMonths / 12} thn` : `${validityMonths} bln`;

    // Auto-advance to Stage 7 if ALL units are issued
    const allIssued = updated.every(u => u.status === 'issued');
    const stagePatch = allIssued ? { stage: 7, stage_started_at: today() } : {};

    await onUpdate({
      ...job,
      units_tracking: updated,
      ...stagePatch,
      history: [...(job.history || []), {
        stage: allIssued ? 7 : 6, ts: today(), by: user.name,
        action: allIssued
          ? `Suket ${unitLabel}: ${noSuket} (${validityLabel}) — SEMUA UNIT TERBIT, lanjut Penagihan`
          : `Suket ${unitLabel}: ${noSuket} (${validityLabel}, sd ${formatDate(tglExp)})`
      }]
    });
  };

  // Mark a unit as rejected by Disnaker
  const rejectUnit = async (unitNo, reason) => {
    const updated = unitsTracking.map(u =>
      u.unit_no === unitNo ? { ...u, status: 'rejected', notes: reason } : u
    );
    const unitLabel = unitsTracking.find(u => u.unit_no === unitNo)?.unit_label;
    await onUpdate({
      ...job,
      units_tracking: updated,
      history: [...(job.history || []), {
        stage: 6, ts: today(), by: user.name,
        action: `Unit ${unitLabel} DITOLAK Disnaker: ${reason}`
      }]
    });
  };

  const addFollowup = async () => {
    if (!followupNote.trim()) {
      alert('Mohon isi catatan follow-up');
      return;
    }
    const newFu = {
      ts: new Date().toISOString(),
      by: user.name,
      status: followupStatus,
      notes: followupNote,
    };
    await onUpdate({
      ...job,
      disnaker_followups: [...followups, newFu],
      history: [...(job.history || []), {
        stage: 6, ts: today(), by: user.name,
        action: `Follow-up Disnaker (${followupStatus}): ${followupNote}`
      }]
    });
    setShowLogModal(false);
    setFollowupNote('');
    setFollowupStatus('progress');
  };

  // Calculate default validity based on pesawat
  const defaultValidityMonths = useMemo(() => {
    const pesawat = PESAWAT_TYPES.find(p => p.code === job.pesawat);
    return pesawat?.validity || 12;
  }, [job.pesawat]);

  return (
    <div>
      <div className="panel-soft" style={{ padding: 16, marginBottom: 16, background: 'rgba(194, 65, 12, 0.04)', borderLeft: '3px solid var(--accent)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <Building2 size={20} style={{ color: 'var(--accent)', flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Pengurusan Suket di {job.disnaker_tujuan || 'Disnaker'}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 4, lineHeight: 1.5 }}>
              Proses Disnaker memakan 1–2 bulan. SOP mewajibkan follow-up status setiap minggu.
            </div>
          </div>
        </div>
      </div>

      {/* Bundle Checklist - mengadopsi FM-PJK3-RIKU-009 */}
      {!submittedToDisnaker && (
        <div className="panel-soft" style={{ marginBottom: 16 }}>
          <div style={{ padding: '12px 16px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Checklist Bundel Dokumen Suket</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>
                Ref: FM-PJK3-RIKU-009 · {checkedRequired}/{requiredItems.length} item wajib terverifikasi
              </div>
            </div>
            <div style={{ width: 120, height: 8, background: 'var(--bg-card)', border: '1px solid var(--line-soft)', position: 'relative' }}>
              <div style={{
                width: `${(checkedRequired / requiredItems.length) * 100}%`,
                height: '100%',
                background: allBundleOK ? 'var(--ok)' : 'var(--accent)',
                transition: 'width 0.3s'
              }} />
            </div>
          </div>

          {[
            { key: 'A', title: 'A. Dokumen dari Client', items: groupedBundle.A },
            { key: 'B', title: 'B. Dokumen dari PJK3', items: groupedBundle.B },
            { key: 'C', title: 'C. Kelengkapan Bundel', items: groupedBundle.C },
          ].map(group => (
            <div key={group.key}>
              <div style={{ padding: '8px 14px', background: 'rgba(26,24,21,0.03)', fontSize: 11, fontWeight: 700, color: 'var(--ink)', letterSpacing: '0.04em' }}>
                {group.title}
              </div>
              {group.items.map((item, idx) => {
                const status = item.checked?.status;
                const isOk = status === 'ok';
                const isMissing = status === 'missing';
                return (
                  <div key={item.id} style={{
                    padding: '10px 14px',
                    borderTop: '1px solid var(--line-soft)',
                    display: 'grid', gridTemplateColumns: '30px 1fr 90px 100px 130px',
                    gap: 10, alignItems: 'center',
                    background: isOk ? 'rgba(21,128,61,0.03)' : isMissing ? 'rgba(153,27,27,0.03)' : 'transparent'
                  }}>
                    <div className="dnp-mono" style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{idx + 1}.</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 500 }}>{item.label}</div>
                      {item.conditional && <span className="tag tag-info" style={{ fontSize: 9, marginTop: 4 }}>KONDISIONAL</span>}
                      {item.auto && <span className="tag tag-slate" style={{ fontSize: 9, marginTop: 4 }}>AUTO dari master data</span>}
                      {item.checked?.by && <div style={{ fontSize: 10, color: 'var(--ink-faint)', marginTop: 2 }}>Oleh {item.checked.by} · {formatDate(item.checked.ts.slice(0,10))}</div>}
                    </div>
                    <div style={{ textAlign: 'center' }}>
                      {item.sourceFound ? (
                        <span className="tag tag-ok" style={{ fontSize: 10 }}>ADA</span>
                      ) : (
                        <span className="tag tag-warn" style={{ fontSize: 10 }}>—</span>
                      )}
                    </div>
                    <div style={{ textAlign: 'center', fontSize: 10, color: 'var(--ink-faint)' }}>
                      {item.checked?.jml ? `${item.checked.jml} lembar` : ''}
                    </div>
                    <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                      <button
                        onClick={() => setBundleItem(item.id, isOk ? null : 'ok')}
                        className="btn btn-sm"
                        style={{
                          background: isOk ? 'var(--ok)' : 'transparent',
                          color: isOk ? 'white' : 'var(--ok)',
                          borderColor: 'var(--ok)',
                          padding: '3px 6px', fontSize: 10
                        }}>
                        <CheckCircle2 size={10} /> OK
                      </button>
                      <button
                        onClick={() => setBundleItem(item.id, isMissing ? null : 'missing')}
                        className="btn btn-sm"
                        style={{
                          background: isMissing ? 'var(--bad)' : 'transparent',
                          color: isMissing ? 'white' : 'var(--bad)',
                          borderColor: 'var(--bad)',
                          padding: '3px 6px', fontSize: 10
                        }}>
                        <X size={10} /> Tdk
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}

          {!allBundleOK && (
            <div style={{ padding: '10px 16px', background: 'rgba(180,83,9,0.06)', borderTop: '1px solid var(--line)', fontSize: 11, color: 'var(--warn)' }}>
              ⚠ {requiredItems.length - checkedRequired} item belum diverifikasi. Pastikan semua dokumen wajib lengkap sebelum submit ke Disnaker untuk menghindari penolakan.
            </div>
          )}
        </div>
      )}

      {/* Multi-Unit Aggregate Status */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 16 }}>
        <div className="panel-soft" style={{ padding: 12, textAlign: 'center' }}>
          <div className="dnp-serif" style={{ fontSize: 24, fontWeight: 600, color: 'var(--slate)' }}>{unitsAggregate.pending}</div>
          <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Pending Submit</div>
        </div>
        <div className="panel-soft" style={{ padding: 12, textAlign: 'center' }}>
          <div className="dnp-serif" style={{ fontSize: 24, fontWeight: 600, color: 'var(--info)' }}>{unitsAggregate.submitted}</div>
          <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Di Disnaker</div>
        </div>
        <div className="panel-soft" style={{ padding: 12, textAlign: 'center' }}>
          <div className="dnp-serif" style={{ fontSize: 24, fontWeight: 600, color: 'var(--ok)' }}>{unitsAggregate.issued}</div>
          <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Suket Terbit</div>
        </div>
        <div className="panel-soft" style={{ padding: 12, textAlign: 'center', background: unitsAggregate.rejected > 0 ? 'rgba(153,27,27,0.06)' : 'transparent' }}>
          <div className="dnp-serif" style={{ fontSize: 24, fontWeight: 600, color: unitsAggregate.rejected > 0 ? 'var(--bad)' : 'var(--ink-faint)' }}>{unitsAggregate.rejected}</div>
          <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Ditolak</div>
        </div>
      </div>

      {/* Aging indicator if any submitted */}
      {anyUnitSubmitted && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 16 }}>
          <div className="panel-soft" style={{ padding: 14 }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600 }}>Aging di Disnaker (Earliest Submit)</div>
            <div className="dnp-serif" style={{ fontSize: 28, fontWeight: 500, marginTop: 4, color: daysSinceSubmit > 60 ? 'var(--bad)' : daysSinceSubmit > 30 ? 'var(--warn)' : 'var(--ink)' }}>
              {daysSinceSubmit} <span style={{ fontSize: 14, color: 'var(--ink-soft)' }}>hari</span>
            </div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>sejak submit pertama ({formatDate(earliestSubmit)})</div>
          </div>
          <div className="panel-soft" style={{ padding: 14, background: followupDue ? 'rgba(153,27,27,0.06)' : 'transparent' }}>
            <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600 }}>Status Follow-Up</div>
            {followupDue ? (
              <>
                <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500, marginTop: 4, color: 'var(--bad)' }}>⚠ JATUH TEMPO ({daysSinceLastFollowup} hari)</div>
                <button className="btn btn-sm btn-danger" onClick={() => setShowLogModal(true)} style={{ marginTop: 6 }}>
                  <Bell size={11} /> Log Follow-Up Sekarang
                </button>
              </>
            ) : (
              <>
                <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500, marginTop: 4, color: 'var(--ok)' }}>✓ {followups.length} follow-up tercatat</div>
                <button className="btn btn-sm" onClick={() => setShowLogModal(true)} style={{ marginTop: 6 }}>
                  <Plus size={11} /> Log Follow-Up
                </button>
              </>
            )}
          </div>
        </div>
      )}

      {/* Per-Unit Tracking Matrix */}
      <div className="panel-soft" style={{ marginBottom: 16 }}>
        <div style={{ padding: '12px 16px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Tracking Per Unit · Multi-Suket</div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>
              {unitsTracking.length} unit dalam 1 PO · setiap unit dapat di-submit & dapat Suket independen
            </div>
          </div>
          {unitsAggregate.pending > 0 && (
            <button className="btn btn-sm btn-primary" onClick={() => {
              const pendingNos = unitsTracking.filter(u => u.status === 'pending').map(u => u.unit_no);
              setActiveUnitId('batch_submit');
            }}>
              <Upload size={12} /> Batch Submit {unitsAggregate.pending} Unit
            </button>
          )}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '50px 1fr 110px 130px 130px 1fr 130px', padding: '8px 16px', background: 'rgba(26,24,21,0.02)', borderBottom: '1px solid var(--line-soft)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
          <div>Unit</div>
          <div>Label / LAIK</div>
          <div>Status</div>
          <div>Tgl Submit</div>
          <div>No Suket</div>
          <div>Masa Berlaku</div>
          <div style={{ textAlign: 'center' }}>Aksi</div>
        </div>
        {unitsTracking.map((u, idx) => {
          const laikOpt = LAIK_STATUS.find(o => o.value === u.laik_status);
          const statusConfig = {
            pending:   { tag: 'tag-slate', label: 'PENDING',    color: 'var(--slate)' },
            submitted: { tag: 'tag-info',  label: 'DI DISNAKER', color: 'var(--info)' },
            issued:    { tag: 'tag-ok',    label: 'TERBIT',      color: 'var(--ok)' },
            rejected:  { tag: 'tag-bad',   label: 'DITOLAK',     color: 'var(--bad)' },
          }[u.status];

          return (
            <div key={u.unit_no} style={{
              display: 'grid', gridTemplateColumns: '50px 1fr 110px 130px 130px 1fr 130px',
              padding: '12px 16px',
              borderBottom: idx < unitsTracking.length - 1 ? '1px solid var(--line-soft)' : 'none',
              alignItems: 'center', fontSize: 12,
              background: u.status === 'issued' ? 'rgba(21,128,61,0.03)' : u.status === 'rejected' ? 'rgba(153,27,27,0.03)' : 'transparent'
            }}>
              <div className="dnp-mono" style={{ fontWeight: 600, fontSize: 14 }}>#{u.unit_no}</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{u.unit_label}</div>
                {laikOpt && <span className={`tag ${laikOpt.tag}`} style={{ fontSize: 9, marginTop: 2 }}>{laikOpt.label}</span>}
                {u.notes && <div style={{ fontSize: 11, color: 'var(--bad)', marginTop: 4 }}>📝 {u.notes}</div>}
              </div>
              <div><span className={`tag ${statusConfig.tag}`} style={{ fontSize: 10 }}>{statusConfig.label}</span></div>
              <div style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace' }}>
                {u.tgl_submit ? formatDate(u.tgl_submit) : '—'}
                {u.no_registrasi && <div style={{ fontSize: 9, color: 'var(--ink-soft)' }}>{u.no_registrasi}</div>}
              </div>
              <div className="dnp-mono" style={{ fontSize: 11, fontWeight: 600 }}>{u.no_suket || '—'}</div>
              <div style={{ fontSize: 11 }}>
                {u.tgl_suket && u.suket_expired_at ? (
                  <>
                    <div style={{ fontFamily: 'JetBrains Mono, monospace' }}>
                      {formatDate(u.tgl_suket)} → {formatDate(u.suket_expired_at)}
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 2 }}>
                      {u.suket_validity_months >= 12 ? `${u.suket_validity_months / 12} tahun` : `${u.suket_validity_months} bulan`}
                    </div>
                  </>
                ) : '—'}
              </div>
              <div style={{ display: 'flex', gap: 4, justifyContent: 'center', flexWrap: 'wrap' }}>
                {u.status === 'pending' && (
                  <button className="btn btn-sm" onClick={() => setActiveUnitId(`submit_${u.unit_no}`)} style={{ fontSize: 10, padding: '3px 6px' }}>
                    <Upload size={10} /> Submit
                  </button>
                )}
                {u.status === 'submitted' && (
                  <>
                    <button className="btn btn-sm" onClick={() => { setActiveUnitId(`issue_${u.unit_no}`); setShowSuketModal(true); }} style={{ background: 'var(--ok)', color: 'white', borderColor: 'var(--ok)', fontSize: 10, padding: '3px 6px' }}>
                      <ShieldCheck size={10} /> Terbit
                    </button>
                    <button className="btn btn-sm btn-danger" onClick={() => {
                      const reason = prompt(`Alasan penolakan unit ${u.unit_label}:`);
                      if (reason?.trim()) rejectUnit(u.unit_no, reason);
                    }} style={{ fontSize: 10, padding: '3px 6px' }}>
                      <X size={10} />
                    </button>
                  </>
                )}
                {u.status === 'rejected' && (
                  <button className="btn btn-sm" onClick={() => updateUnit(u.unit_no, { status: 'pending', notes: '' })} style={{ fontSize: 10, padding: '3px 6px' }}>
                    <RotateCcw size={10} /> Re-submit
                  </button>
                )}
                {u.status === 'issued' && (
                  <span className="tag tag-ok" style={{ fontSize: 10 }}>✓ Selesai</span>
                )}
              </div>
            </div>
          );
        })}

        {allUnitsIssued && (
          <div style={{ padding: '12px 16px', background: 'rgba(21,128,61,0.06)', borderTop: '1px solid var(--ok)', fontSize: 12, fontWeight: 600, color: 'var(--ok)', textAlign: 'center' }}>
            ✅ Semua {unitsTracking.length} unit sudah terbit Suket. Job otomatis pindah ke Tahap 7 (Penagihan).
          </div>
        )}
      </div>

      {/* Follow-up history */}
      {followups.length > 0 && (
        <div className="panel-soft" style={{ marginBottom: 16 }}>
          <div style={{ padding: '10px 14px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            Riwayat Follow-Up ({followups.length})
          </div>
          {followups.slice().reverse().map((fu, i) => (
            <div key={i} style={{ padding: 12, borderBottom: i < followups.length - 1 ? '1px solid var(--line-soft)' : 'none', display: 'grid', gridTemplateColumns: '120px 110px 1fr', gap: 12, alignItems: 'flex-start' }}>
              <div className="dnp-mono" style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{formatDateTime(fu.ts)}</div>
              <div>
                <span className={`tag ${fu.status === 'progress' ? 'tag-info' : fu.status === 'stuck' ? 'tag-bad' : fu.status === 'ready' ? 'tag-ok' : 'tag-warn'}`} style={{ fontSize: 10 }}>
                  {fu.status === 'progress' ? 'PROGRESS' : fu.status === 'stuck' ? 'TERHAMBAT' : fu.status === 'ready' ? 'SIAP TERBIT' : fu.status.toUpperCase()}
                </span>
              </div>
              <div style={{ fontSize: 12 }}>
                {fu.notes}
                <div style={{ fontSize: 10, color: 'var(--ink-faint)', marginTop: 2 }}>oleh {fu.by}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Unit Submit/Issue Modal */}
      {activeUnitId && (
        <UnitActionModal
          job={job}
          unitsTracking={unitsTracking}
          activeUnitId={activeUnitId}
          onClose={() => { setActiveUnitId(null); setShowSuketModal(false); }}
          onSubmit={submitUnitsToDisnaker}
          onIssue={issueSuketForUnit}
          defaultValidityMonths={defaultValidityMonths}
        />
      )}

      {/* Follow-Up Log Modal */}
      {showLogModal && (
        <div className="modal-backdrop" onClick={() => setShowLogModal(false)} style={{ zIndex: 60 }}>
          <div className="modal-content fadein" onClick={e => e.stopPropagation()} style={{ maxWidth: 500 }}>
            <div style={{ padding: '18px 24px', borderBottom: '1px solid var(--line)' }}>
              <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Log Follow-Up Disnaker</div>
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>{formatDate(today())} · {user.name}</div>
            </div>
            <div style={{ padding: 24 }}>
              <label className="inp-label">Status</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginBottom: 14 }}>
                {[
                  { value: 'progress', label: 'Progress' },
                  { value: 'stuck', label: 'Terhambat' },
                  { value: 'ready', label: 'Siap Terbit' },
                ].map(opt => (
                  <button key={opt.value} onClick={() => setFollowupStatus(opt.value)}
                    className="btn btn-sm"
                    style={{
                      background: followupStatus === opt.value ? 'var(--ink)' : 'transparent',
                      color: followupStatus === opt.value ? 'var(--bg-card)' : 'var(--ink)',
                      justifyContent: 'center',
                    }}>{opt.label}</button>
                ))}
              </div>
              <label className="inp-label">Catatan Follow-Up *</label>
              <textarea className="inp" rows="4" value={followupNote} onChange={e => setFollowupNote(e.target.value)}
                placeholder="Contoh: Telp ke Pak Budi di Disnaker, info: dokumen sedang di-review Kabid, perkiraan selesai minggu depan..."
                style={{ resize: 'vertical', fontFamily: 'Geist, sans-serif' }} />
            </div>
            <div style={{ padding: '14px 24px', borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
              <button className="btn" onClick={() => setShowLogModal(false)}>Batal</button>
              <button className="btn btn-primary" onClick={addFollowup}><Plus size={12} /> Simpan</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function JobDetailModal({ job, user, allJobs, onClose, onUpdate, onDelete }) {
  const [tab, setTab] = useState('timeline');
  const fileInputRef = useRef(null);
  const [uploadStage, setUploadStage] = useState(null);
  const [uploadType, setUploadType] = useState('');
  const [editMode, setEditMode] = useState(false);
  const [editForm, setEditForm] = useState({ ...job });

  const stageInfo = STAGES.find(s => s.id === job.stage);
  const status = jobStatus(job);
  const pesawat = PESAWAT_TYPES.find(p => p.code === job.pesawat);
  const canAdvance = STAGE_PERMISSIONS[job.stage]?.includes(user.role);

  // Determine if current user has an action panel for current stage
  const isAdminOrManager = user.role === 'admin' || user.role === 'manager';
  const isInspekturOrManager = user.role === 'inspektur' || user.role === 'manager';
  const showVerifyTab = job.stage === 2 && isAdminOrManager && !job.completed_at;
  const showScheduleTab = job.stage === 3 && isAdminOrManager && !job.completed_at;
  const showFieldTab = job.stage === 4 && isInspekturOrManager && !job.completed_at;
  const showEvaluateTab = job.stage === 5 && isInspekturOrManager && !job.completed_at;
  const showDisnakerTab = job.stage === 6 && (user.role === 'admin' || user.role === 'manager') && !job.completed_at;

  // Default tab logic: open action tab if available
  useEffect(() => {
    if (showVerifyTab) setTab('verify');
    else if (showScheduleTab) setTab('schedule');
    else if (showFieldTab) setTab('field');
    else if (showEvaluateTab) setTab('evaluate');
    else if (showDisnakerTab) setTab('disnaker');
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [job.id]);

  const advance = async () => {
    if (job.stage >= 7) return;
    if (job.stage === 3 && !job.h5_confirmed) {
      alert('Tidak bisa lanjut: Konfirmasi H-5 Teman K3 dulu di tab Penjadwalan.');
      return;
    }
    if (job.stage === 5 && job.peer_review_status !== 'approved') {
      alert('Tidak bisa lanjut: LHPP & BAP belum disetujui Supervisor. Buka tab Evaluasi & Review.');
      return;
    }
    const nextStage = job.stage + 1;
    const updated = {
      ...job,
      stage: nextStage,
      stage_started_at: today(),
      history: [...(job.history || []), {
        stage: nextStage, ts: today(), by: user.name,
        action: `Pindah ke Tahap ${nextStage}: ${STAGES[nextStage - 1].name}`
      }]
    };
    await onUpdate(updated);
  };

  const markComplete = async () => {
    const updated = {
      ...job,
      completed_at: today(),
      history: [...(job.history || []), {
        stage: 7, ts: today(), by: user.name,
        action: 'Job ditandai SELESAI - Suket diserahkan ke klien'
      }]
    };
    await onUpdate(updated);
  };

  const handleFileSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file || uploadStage === null || !uploadType) return;
    if (file.size > MAX_FILE_SIZE) {
      alert(`File terlalu besar (${formatFileSize(file.size)}). Maksimal ${formatFileSize(MAX_FILE_SIZE)} per file.\n\nTip: compress PDF/foto sebelum upload, atau pakai cloud storage untuk file besar.`);
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const newDoc = {
        stage: uploadStage, type: uploadType, name: file.name,
        size: file.size, mime: file.type,
        uploaded_at: today(), by: user.name,
        data_url: ev.target.result, // full base64 stored
      };
      const updated = {
        ...job,
        documents: [...(job.documents || []), newDoc],
        history: [...(job.history || []), {
          stage: uploadStage, ts: today(), by: user.name,
          action: `Upload dokumen: ${uploadType} (${file.name})`
        }]
      };
      try {
        await onUpdate(updated);
        setUploadStage(null);
        setUploadType('');
      } catch (err) {
        alert('Gagal menyimpan dokumen. Storage browser mungkin penuh. Hapus dokumen lama atau gunakan file lebih kecil.');
      }
    };
    reader.onerror = () => alert('Gagal membaca file.');
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const downloadDoc = (doc) => {
    if (!doc.data_url) {
      alert('File ini hanya metadata demo, tidak ada konten asli.');
      return;
    }
    const a = document.createElement('a');
    a.href = doc.data_url;
    a.download = doc.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const deleteDoc = async (idx) => {
    if (!confirm('Hapus dokumen ini?')) return;
    const newDocs = job.documents.filter((_, i) => i !== idx);
    await onUpdate({ ...job, documents: newDocs });
  };

  const saveEdit = async () => {
    const safeForm = { ...editForm };
    if (user.role === 'admin') {
      // Admin tidak boleh ubah data finansial - revert ke nilai asli
      safeForm.nilai = job.nilai;
      safeForm.units = job.units;
    }
    // Audit log for financial changes
    const newHistory = [...(job.history || [])];
    if (user.role === 'manager') {
      const nilaiBaru = Number(safeForm.nilai) || 0;
      const unitsBaru = Number(safeForm.units) || 1;
      if (nilaiBaru !== (job.nilai || 0)) {
        if (!confirm(`Mengubah Nilai Kontrak dari ${formatRp(job.nilai)} menjadi ${formatRp(nilaiBaru)}.\n\nPerubahan harga setelah PO dibuat seharusnya disetujui manajemen tingkat atas. Lanjutkan?`)) return;
        newHistory.push({
          stage: job.stage, ts: today(), by: user.name,
          action: `[AUDIT] Nilai kontrak diubah: ${formatRp(job.nilai)} → ${formatRp(nilaiBaru)}`
        });
      }
      if (unitsBaru !== (job.units || 1)) {
        newHistory.push({
          stage: job.stage, ts: today(), by: user.name,
          action: `[AUDIT] Jumlah unit diubah: ${job.units} → ${unitsBaru}`
        });
      }
    }
    await onUpdate({
      ...safeForm,
      nilai: Number(safeForm.nilai) || 0,
      units: Number(safeForm.units) || 1,
      history: newHistory
    });
    setEditMode(false);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-content fadein" onClick={e => e.stopPropagation()} style={{ maxWidth: 1000 }}>
        {/* Header */}
        <div style={{ padding: '20px 28px', borderBottom: '1px solid var(--line)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <span className="dnp-mono" style={{ fontSize: 13, fontWeight: 600 }}>{job.kode}</span>
                <StagePill stage={job.stage} />
                {status === 'overdue' && <StatusTag status="overdue">OVERDUE</StatusTag>}
                {status === 'warning' && <StatusTag status="warning">Warning</StatusTag>}
                {status === 'completed' && <StatusTag status="completed">Selesai</StatusTag>}
              </div>
              <div className="dnp-serif" style={{ fontSize: 22, fontWeight: 500, lineHeight: 1.2 }}>{job.klien}</div>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginTop: 4 }}>{job.lokasi}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={onClose}><X size={16} /></button>
          </div>

          {/* Quick stats */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginTop: 16, padding: '12px 0', borderTop: '1px solid var(--line-soft)' }}>
            <div>
              <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>Pesawat</div>
              <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{pesawat?.name}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{pesawat?.form} · {job.units} unit</div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>No PO</div>
              <div className="dnp-mono" style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{job.no_po}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{formatDate(job.tgl_po)}</div>
            </div>
            {user.role !== 'inspektur' && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>Nilai</div>
                <div className="dnp-mono" style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{formatRp(job.nilai)}</div>
              </div>
            )}
            {user.role === 'inspektur' && (
              <div>
                <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>Inspektur Ditugaskan</div>
                <div style={{ fontSize: 12, fontWeight: 500, marginTop: 2 }}>{job.inspektur || '—'}</div>
              </div>
            )}
            <div>
              <div style={{ fontSize: 10, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>PIC Klien</div>
              <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{job.pic_klien || '—'}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{job.pic_klien_phone || '—'}</div>
            </div>
          </div>
        </div>

        {/* Action bar */}
        <div style={{ padding: '12px 28px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
            {showVerifyTab && (
              <button onClick={() => setTab('verify')}
                style={{
                  padding: '6px 12px', border: 'none',
                  background: tab === 'verify' ? 'var(--accent)' : 'transparent',
                  color: tab === 'verify' ? 'white' : 'var(--accent)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'Geist, sans-serif',
                  borderBottom: tab === 'verify' ? 'none' : '2px solid var(--accent)',
                  display: 'flex', alignItems: 'center', gap: 4
                }}><ClipboardList size={12} /> Verifikasi <span className="pulse-dot">●</span></button>
            )}
            {showScheduleTab && (
              <button onClick={() => setTab('schedule')}

function SuketReminder({ jobs, onSelectJob }) {
  // Flatten: each unit with issued Suket becomes a row
  const sukets = useMemo(() => {
    const rows = [];
    jobs.forEach(j => {
      // New multi-unit format
      if (j.units_tracking && j.units_tracking.length > 0) {
        j.units_tracking.forEach(u => {
          if (u.no_suket && u.suket_expired_at) {
            rows.push({
              job: j,
              unit: u,
              key: `${j.id}-${u.unit_no}`,
              kode: `${j.kode}-U${u.unit_no}`,
              klien: j.klien,
              unit_label: u.unit_label,
              no_suket: u.no_suket,
              tgl_suket: u.tgl_suket,
              expired_at: u.suket_expired_at,
              validity_months: u.suket_validity_months,
            });
          }
        });
      }
      // Legacy single-job format (backward compatibility)
      else if (j.no_suket && j.suket_expired_at) {
        rows.push({
          job: j,
          unit: null,
          key: j.id,
          kode: j.kode,
          klien: j.klien,
          unit_label: `${j.units} unit (single)`,
          no_suket: j.no_suket,
          tgl_suket: j.tgl_suket,
          expired_at: j.suket_expired_at,
          validity_months: j.suket_validity_months,
        });
      }
    });
    return rows;
  }, [jobs]);

  const rowStatus = (row) => {
    const days = daysBetween(today(), row.expired_at);
    if (days < 0) return 'expired';
    if (days <= 90) return 'expiring_soon';
    return 'valid';
  };

  const expired = sukets.filter(r => rowStatus(r) === 'expired');
  const expiringSoon = sukets.filter(r => rowStatus(r) === 'expiring_soon');
  const valid = sukets.filter(r => rowStatus(r) === 'valid');

  const renderList = (list, label) => {
    if (list.length === 0) return null;
    return (
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 8 }}>{label} · {list.length}</div>
        <div className="panel">
          <div style={{ display: 'grid', gridTemplateColumns: '130px 1fr 1fr 160px 160px 160px 110px', padding: '10px 16px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            <div>Kode-Unit</div>
            <div>Klien</div>
            <div>Unit / No Suket</div>
            <div>Tgl Terbit</div>
            <div>Berlaku Sampai</div>
            <div>Masa Berlaku</div>
            <div style={{ textAlign: 'center' }}>Status</div>
          </div>
          {list.map((row, i) => {
            const st = rowStatus(row);
            const days = daysBetween(today(), row.expired_at);
            const validityLabel = row.validity_months >= 12 ? `${row.validity_months / 12} tahun` : `${row.validity_months} bulan`;
            return (
              <div key={row.key} className="row-hover" onClick={() => onSelectJob(row.job)}
                style={{ display: 'grid', gridTemplateColumns: '130px 1fr 1fr 160px 160px 160px 110px', padding: '12px 16px', borderBottom: i < list.length - 1 ? '1px solid var(--line-soft)' : 'none', alignItems: 'center', fontSize: 13 }}>
                <div className="dnp-mono" style={{ fontWeight: 600, fontSize: 11 }}>{row.kode}</div>
                <div style={{ fontWeight: 500 }}>{row.klien}</div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{row.unit_label}</div>
                  <div className="dnp-mono" style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>{row.no_suket}</div>
                </div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>{formatDate(row.tgl_suket)}</div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>
                  {formatDate(row.expired_at)}
                  <div style={{ fontSize: 10, color: 'var(--ink-soft)' }}>
                    {days < 0 ? `Expired ${Math.abs(days)} hari lalu` : `${days} hari lagi`}
                  </div>
                </div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{validityLabel || '—'}</div>
                <div style={{ textAlign: 'center' }}>
                  <StatusTag status={st}>{{ expired: 'EXPIRED', expiring_soon: 'EXPIRING', valid: 'VALID' }[st]}</StatusTag>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div className="fadein" style={{ padding: 24 }}>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Re-Inspection Reminder</div>
        <h1 className="dnp-serif" style={{ fontSize: 32, fontWeight: 500, margin: '4px 0 0' }}>Database Masa Berlaku Suket</h1>
        <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginTop: 4 }}>
          Reminder otomatis per-unit: setiap Suket dilacak independen sesuai masa berlaku. Alert H-90 untuk re-inspeksi.
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 24 }}>
        <KPICard label="Expired" value={expired.length} sub="Perlu kontak klien" icon={AlertCircle} accent={expired.length > 0 ? 'var(--bad)' : null} />
        <KPICard label="Akan Expire (≤90h)" value={expiringSoon.length} sub="Schedule re-inspeksi" icon={Clock} accent={expiringSoon.length > 0 ? 'var(--warn)' : null} />
        <KPICard label="Valid" value={valid.length} sub="Suket aktif" icon={ShieldCheck} accent="var(--ok)" />
      </div>

      {sukets.length === 0 ? (
        <div className="panel" style={{ padding: 40, textAlign: 'center', color: 'var(--ink-soft)' }}>
          <ShieldCheck size={32} style={{ margin: '0 auto 12px', opacity: 0.4 }} />
          <div>Belum ada Suket terbit.</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Suket akan muncul di sini setelah Kadiv RU input No Suket dari Disnaker di Tahap 6.</div>
        </div>
      ) : (
        <>
          {renderList(expired, 'Expired')}
          {renderList(expiringSoon, 'Akan Expire (≤90 hari)')}
          {renderList(valid, 'Valid')}
        </>
      )}
    </div>
  );
}
