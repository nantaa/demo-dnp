function KanbanBoard({ jobs, user, onSelectJob, onAdvance }) {
  const activeJobs = jobs.filter(j => !(j.stage === 7 && j.completed_at));

  return (
    <div className="fadein" style={{ padding: 24 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Workflow Stages</div>
        <h1 className="dnp-serif" style={{ fontSize: 32, fontWeight: 500, margin: '4px 0 0' }}>Kanban Board</h1>
        <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginTop: 4 }}>
          {activeJobs.length} job aktif · klik card untuk detail, klik <ArrowRight size={12} style={{ display: 'inline', verticalAlign: -1 }} /> untuk geser ke tahap berikutnya (jika ada permission)
        </div>
      </div>

      <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 16 }}>
        {STAGES.map(stage => {
          const stageJobs = activeJobs.filter(j => j.stage === stage.id);
          return (
            <div key={stage.id} className="kanban-col">
              <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--line)', background: 'var(--bg-card)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: 'var(--ink-faint)', fontWeight: 600 }}>STAGE {String(stage.id).padStart(2,'0')}</div>
                  <span className="dnp-mono" style={{ fontSize: 12, fontWeight: 700 }}>{stageJobs.length}</span>
                </div>
                <div className="dnp-serif" style={{ fontSize: 16, fontWeight: 500, marginTop: 2, lineHeight: 1.2 }}>{stage.name}</div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>{stage.short} {stage.sla ? `· SLA ${stage.sla} hari${stage.id === 5 ? '/unit' : ''}` : ''}</div>
              </div>

              <div style={{ padding: 10, display: 'flex', flexDirection: 'column', gap: 8, minHeight: 200 }}>
                {stageJobs.length === 0 && (
                  <div style={{ padding: '24px 8px', textAlign: 'center', fontSize: 11, color: 'var(--ink-faint)', fontStyle: 'italic' }}>tidak ada job</div>
                )}
                {stageJobs.map(job => {
                  const status = jobStatus(job);
                  const days = daysBetween(job.stage_started_at, today());
                  const pesawat = PESAWAT_TYPES.find(p => p.code === job.pesawat);
                  const canAdvance = STAGE_PERMISSIONS[stage.id]?.includes(user.role);
                  // Stage-specific indicators
                  const h5Pending = stage.id === 3 && job.no_surat_tugas && !job.h5_confirmed;
                  const reviewPending = stage.id === 5 && job.peer_review_status === 'submitted';
                  const reviewRevision = stage.id === 5 && job.peer_review_status === 'revision';
                  const fuOverdue = stage.id === 6 && job.tgl_submit_disnaker &&
                    daysBetween((job.disnaker_followups?.[job.disnaker_followups.length - 1]?.ts || job.tgl_submit_disnaker).slice(0,10), today()) >= 7;
                  const laikBadge = LAIK_STATUS.find(o => o.value === job.laik_status);
                  // Aging timer: progress bar SLA usage
                  const slaForStage = stage.sla ? (stage.id === 5 ? stage.sla * (job.units || 1) : stage.sla) : null;
                  const slaUsagePct = slaForStage ? Math.min(100, (days / slaForStage) * 100) : 0;
                  return (
                    <div key={job.id} className="kanban-card" onClick={() => onSelectJob(job)}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6, marginBottom: 6 }}>
                        <span className="dnp-mono" style={{ fontSize: 11, fontWeight: 600 }}>{job.kode}</span>
                        {status === 'overdue' && <StatusTag status="overdue">OVERDUE</StatusTag>}
                        {status === 'warning' && <StatusTag status="warning">⚠ {days} hari</StatusTag>}
                        {status === 'on_track' && stage.sla && <span className="kanban-card-meta" style={{ fontSize: 10, color: 'var(--ink-soft)', fontFamily: 'JetBrains Mono, monospace' }}>{days}/{slaForStage}d</span>}
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3, marginBottom: 4 }}>{job.klien}</div>
                      <div className="kanban-card-meta" style={{ fontSize: 11, color: 'var(--ink-soft)', marginBottom: 8 }}>
                        {pesawat?.name} · {job.units} unit
                      </div>

                      {/* SLA aging progress bar */}
                      {slaForStage && (
                        <div style={{ height: 3, background: 'var(--bg-deep)', position: 'relative', marginBottom: 8 }} title={`SLA ${slaForStage}h, terpakai ${days}h (${Math.round(slaUsagePct)}%)`}>
                          <div style={{
                            width: `${slaUsagePct}%`,
                            height: '100%',
                            background: status === 'overdue' ? 'var(--bad)' : status === 'warning' ? 'var(--warn)' : 'var(--ok)',
                            transition: 'width 0.3s'
                          }} />
                        </div>
                      )}

                      {/* Stage-specific indicator badges */}
                      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 8 }}>
                        {h5Pending && <span className="tag tag-bad" style={{ fontSize: 9 }}>⚠ H-5 BELUM</span>}
                        {stage.id === 3 && job.h5_confirmed && <span className="tag tag-ok" style={{ fontSize: 9 }}>✓ H-5 OK</span>}
                        {reviewPending && <span className="tag tag-info" style={{ fontSize: 9 }}>👁 NEED REVIEW</span>}
                        {reviewRevision && <span className="tag tag-warn" style={{ fontSize: 9 }}>↺ REVISI</span>}
                        {fuOverdue && <span className="tag tag-bad" style={{ fontSize: 9 }}>📞 FU DUE</span>}
                        {laikBadge && stage.id >= 5 && <span className={`tag ${laikBadge.tag}`} style={{ fontSize: 9 }}>{laikBadge.label}</span>}
                      </div>

                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: '1px solid var(--line-soft)', paddingTop: 8, marginTop: 4 }}>
                        <div className="kanban-card-meta" style={{ fontSize: 10, color: 'var(--ink-soft)' }}>
                          {user.role === 'inspektur' ? (job.inspektur || '— belum di-assign').split(',')[0].trim().slice(0, 18) : formatRp(job.nilai)}
                        </div>
                        {canAdvance && job.stage < 7 && !h5Pending && !reviewPending && (
                          <button onClick={(e) => { e.stopPropagation(); onAdvance(job); }}
                            style={{ background: 'transparent', border: '1px solid currentColor', color: 'inherit', padding: '2px 6px', cursor: 'pointer', fontSize: 10, display: 'flex', alignItems: 'center', gap: 2 }}>
                            <ArrowRight size={11} />
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function JobList({ jobs, user, onSelectJob }) {
  const [search, setSearch] = useState('');
  const [filterStage, setFilterStage] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterMine, setFilterMine] = useState(user.role === 'marketing');
  const isMKT = user.role === 'marketing';

  const filtered = useMemo(() => {
    return jobs.filter(j => {
      if (isMKT && filterMine && j.owner_marketing !== user.name) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!j.klien.toLowerCase().includes(q) && !j.kode.toLowerCase().includes(q) && !j.lokasi.toLowerCase().includes(q)) return false;
      }
      if (filterStage !== 'all' && j.stage !== Number(filterStage)) return false;
      if (filterStatus !== 'all' && jobStatus(j) !== filterStatus) return false;
      return true;
    });
  }, [jobs, search, filterStage, filterStatus, filterMine, isMKT, user.name]);

  return (
    <div className="fadein" style={{ padding: 24 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>All Jobs</div>
          <h1 className="dnp-serif" style={{ fontSize: 32, fontWeight: 500, margin: '4px 0 0' }}>Daftar Job</h1>
        </div>
        {isMKT && (
          <div style={{ display: 'flex', gap: 0, border: '1px solid var(--line)' }}>
            <button onClick={() => setFilterMine(true)}
              style={{
                padding: '6px 12px', border: 'none', borderRight: '1px solid var(--line)',
                background: filterMine ? 'var(--ink)' : 'var(--bg-card)',
                color: filterMine ? 'var(--bg-card)' : 'var(--ink)',
                fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'Geist, sans-serif',
                display: 'flex', alignItems: 'center', gap: 4
              }}><User size={12} /> Pekerjaan Saya</button>
            <button onClick={() => setFilterMine(false)}
              style={{
                padding: '6px 12px', border: 'none',
                background: !filterMine ? 'var(--ink)' : 'var(--bg-card)',
                color: !filterMine ? 'var(--bg-card)' : 'var(--ink)',
                fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'Geist, sans-serif'
              }}>Semua Job</button>
          </div>
        )}
      </div>

      <div className="panel" style={{ padding: 12, marginBottom: 16, display: 'flex', gap: 8, alignItems: 'center' }}>
        <div style={{ position: 'relative', flex: 1 }}>
          <Search size={14} style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-faint)' }} />
          <input className="inp" placeholder="Cari klien, kode, atau lokasi..." value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: 36 }} />
        </div>
        <select className="inp" value={filterStage} onChange={e => setFilterStage(e.target.value)} style={{ width: 200 }}>
          <option value="all">Semua Tahap</option>
          {STAGES.map(s => <option key={s.id} value={s.id}>Tahap {s.id} · {s.name}</option>)}
        </select>
        <select className="inp" value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ width: 160 }}>
          <option value="all">Semua Status</option>
          <option value="on_track">On Track</option>
          <option value="warning">Warning</option>
          <option value="overdue">Overdue</option>
          <option value="completed">Selesai</option>
        </select>
      </div>

      <div className="panel">
        {(() => {
          const showNilai = user.role !== 'inspektur';
          const gridCols = showNilai
            ? '100px 1fr 120px 110px 90px 130px 110px 90px'
            : '100px 1fr 120px 110px 90px 110px 90px';
          return (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: gridCols, padding: '10px 16px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
                <div>Kode</div>
                <div>Klien / Lokasi</div>
                <div>Pesawat</div>
                <div>Tahap</div>
                <div>Marketing</div>
                {showNilai && <div style={{ textAlign: 'right' }}>Nilai</div>}
                <div>Tgl PO</div>
                <div style={{ textAlign: 'center' }}>Status</div>
              </div>
              {filtered.length === 0 && (
                <div style={{ padding: '40px 20px', textAlign: 'center', color: 'var(--ink-soft)', fontSize: 13 }}>
                  {isMKT && filterMine ? 'Belum ada pekerjaan Anda. Klik "Job Baru" untuk mulai.' : 'Tidak ada job sesuai filter.'}
                </div>
              )}
              {filtered.map((j, i) => {
                const pesawat = PESAWAT_TYPES.find(p => p.code === j.pesawat);
                const status = jobStatus(j);
                const statusLabel = { on_track: 'On Track', warning: 'Warning', overdue: 'Overdue', completed: 'Selesai' }[status];
                const isOwn = j.owner_marketing === user.name;
                return (
                  <div key={j.id} onClick={() => onSelectJob(j)} className="row-hover"
                    style={{ display: 'grid', gridTemplateColumns: gridCols, padding: '12px 16px', borderBottom: i < filtered.length - 1 ? '1px solid var(--line-soft)' : 'none', alignItems: 'center', fontSize: 13 }}>
                    <div className="dnp-mono" style={{ fontWeight: 600 }}>{j.kode}</div>
                    <div>
                      <div style={{ fontWeight: 600 }}>{j.klien}</div>
                      <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>{j.lokasi}</div>
                    </div>
                    <div style={{ fontSize: 12 }}>{pesawat?.name}<br /><span style={{ fontSize: 10, color: 'var(--ink-soft)' }}>{pesawat?.form} · {j.units} unit</span></div>
                    <div style={{ fontSize: 11 }}><StagePill stage={j.stage} /></div>
                    <div style={{ fontSize: 11 }}>
                      {j.owner_marketing ? (
                        <span style={{
                          fontWeight: isMKT && isOwn ? 600 : 400,
                          color: isMKT && isOwn ? 'var(--accent)' : 'var(--ink)'
                        }}>
                          {isMKT && isOwn ? '★ ' : ''}{j.owner_marketing}
                        </span>
                      ) : <span style={{ color: 'var(--ink-faint)' }}>—</span>}
                    </div>
                    {showNilai && <div style={{ textAlign: 'right', fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}>{formatRp(j.nilai)}</div>}
                    <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>{formatDate(j.tgl_po)}</div>
                    <div style={{ textAlign: 'center' }}><StatusTag status={status}>{statusLabel}</StatusTag></div>
                  </div>
                );
              })}
            </>
          );
        })()}
      </div>
    </div>
  );
}

function NewJobModal({ onClose, onSave, user }) {
  const [form, setForm] = useState({
    klien: '', lokasi: '', pic_klien: '', pic_klien_phone: '',
    pesawat: 'FIRE', units: 1, nilai: '',
    no_po: '', tgl_po: today(), notes: ''
  });
  const [attachments, setAttachments] = useState([]); // {type, name, size, data_url}
  const [pickType, setPickType] = useState('PO/SPK');
  const fileRef = useRef(null);

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const STAGE1_DOC_TYPES = DOC_TYPES_BY_STAGE[1];

  const onPickFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (f.size > MAX_FILE_SIZE) {
      alert(`File terlalu besar (${formatFileSize(f.size)}). Maksimal ${formatFileSize(MAX_FILE_SIZE)} per file.`);
      e.target.value = '';
      return;
    }
    const r = new FileReader();
    r.onload = (ev) => {
      setAttachments(prev => [...prev, {
        type: pickType, name: f.name, size: f.size, mime: f.type,
        data_url: ev.target.result, uploaded_at: today(), by: user.name, stage: 1
      }]);
    };
    r.readAsDataURL(f);
    e.target.value = '';
  };

  const removeAttachment = (idx) => {
    setAttachments(prev => prev.filter((_, i) => i !== idx));
  };

  const submit = async () => {
    if (!form.klien || !form.lokasi || !form.no_po) {
      alert('Mohon isi: Nama Klien, Lokasi, dan No PO');
      return;
    }
    const hasPO = attachments.some(a => a.type === 'PO/SPK');
    if (!hasPO) {
      if (!confirm('Anda belum upload scan PO/SPK. Lanjutkan tanpa scan PO?')) return;
    }
    const seq = await getNextSeq();
    const job = {
      id: `job-${Date.now()}`,
      kode: generateKode(seq),
      ...form,
      units: Number(form.units) || 1,
      nilai: Number(form.nilai) || 0,
      owner_marketing: user.role === 'marketing' ? user.name : (form.owner_marketing || user.name),
      stage: 1,
      stage_started_at: today(),
      created_at: today(),
      documents: attachments,
      history: [
        { stage: 1, ts: today(), by: user.name, action: `Job dibuat dari PO ${form.no_po}` },
        ...(attachments.length > 0 ? [{
          stage: 1, ts: today(), by: user.name,
          action: `Upload ${attachments.length} dokumen: ${attachments.map(a => a.type).join(', ')}`
        }] : [])
      ],
    };
    await onSave(job);
    onClose();
  };

  const totalSize = attachments.reduce((s, a) => s + (a.size || 0), 0);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-content fadein" onClick={e => e.stopPropagation()}>
        <div style={{ padding: '20px 28px', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Tahap 1 · Marketing</div>
            <div className="dnp-serif" style={{ fontSize: 24, fontWeight: 500, marginTop: 2 }}>Job Baru</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><X size={16} /></button>
        </div>

        <div style={{ padding: 28, overflowY: 'auto', flex: 1 }}>
          {/* Info Klien & PO */}
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 12 }}>1. Informasi Klien & PO</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
            <div style={{ gridColumn: 'span 2' }}>
              <label className="inp-label">Nama Klien *</label>
              <input className="inp" value={form.klien} onChange={e => update('klien', e.target.value)} placeholder="PT Contoh Sejahtera" />
            </div>
            <div>
              <label className="inp-label">Lokasi *</label>
              <input className="inp" value={form.lokasi} onChange={e => update('lokasi', e.target.value)} placeholder="Cikarang, Bekasi" />
            </div>
            <div>
              <label className="inp-label">PIC Klien</label>
              <input className="inp" value={form.pic_klien} onChange={e => update('pic_klien', e.target.value)} placeholder="Nama + Jabatan" />
            </div>
            <div>
              <label className="inp-label">Telepon PIC</label>
              <input className="inp" value={form.pic_klien_phone} onChange={e => update('pic_klien_phone', e.target.value)} placeholder="081x-xxxx-xxxx" />
            </div>
            <div>
              <label className="inp-label">Jenis Pesawat</label>
              <select className="inp" value={form.pesawat} onChange={e => update('pesawat', e.target.value)}>
                {PESAWAT_TYPES.map(p => <option key={p.code} value={p.code}>{p.name} ({p.form})</option>)}
              </select>
            </div>
            <div>
              <label className="inp-label">Jumlah Unit</label>
              <input className="inp" type="number" min="1" value={form.units} onChange={e => update('units', e.target.value)} />
            </div>
            <div>
              <label className="inp-label">Nilai Kontrak (Rp)</label>
              <input className="inp" type="number" value={form.nilai} onChange={e => update('nilai', e.target.value)} placeholder="50000000" />
            </div>
            <div>
              <label className="inp-label">No PO / SPK *</label>
              <input className="inp" value={form.no_po} onChange={e => update('no_po', e.target.value)} placeholder="PO/CLIENT/2026/0123" />
            </div>
            <div>
              <label className="inp-label">Tanggal PO</label>
              <input className="inp" type="date" value={form.tgl_po} onChange={e => update('tgl_po', e.target.value)} />
            </div>
            <div style={{ gridColumn: 'span 2' }}>
              <label className="inp-label">Catatan / Scope of Work</label>
              <textarea className="inp" rows="2" value={form.notes} onChange={e => update('notes', e.target.value)} placeholder="Misal: Sprinkler 3 zona + Fire Alarm panel" style={{ resize: 'vertical', fontFamily: 'Geist, sans-serif' }} />
            </div>
          </div>

          {/* Document Upload Section */}
          <div className="divider" style={{ margin: '8px 0 20px' }} />
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 8 }}>
            2. Upload Dokumen dari Klien
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginBottom: 12, lineHeight: 1.5 }}>
            Upload scan PO/SPK dan dokumen persyaratan dari klien. Admin akan memverifikasi kelengkapan ini di tahap berikutnya. Maksimal {formatFileSize(MAX_FILE_SIZE)} per file.
          </div>

          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
            <select className="inp" value={pickType} onChange={e => setPickType(e.target.value)} style={{ flex: 1, maxWidth: 280 }}>
              {STAGE1_DOC_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <button className="btn btn-primary" onClick={() => fileRef.current?.click()}>
              <Upload size={14} /> Pilih File
            </button>
            <input ref={fileRef} type="file" style={{ display: 'none' }} onChange={onPickFile}
              accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" />
          </div>

          {attachments.length === 0 ? (
            <div style={{
              padding: 20, border: '2px dashed var(--line-soft)',
              textAlign: 'center', fontSize: 12, color: 'var(--ink-soft)'
            }}>
              <Upload size={20} style={{ opacity: 0.4, marginBottom: 6 }} /><br />
              Belum ada dokumen. Disarankan upload minimal: scan PO/SPK + Surat Permohonan + Surat Kuasa.
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginBottom: 6, display: 'flex', justifyContent: 'space-between' }}>
                <span>{attachments.length} file terlampir</span>
                <span className="dnp-mono">Total: {formatFileSize(totalSize)}</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {attachments.map((a, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', background: 'var(--bg-deep)', border: '1px solid var(--line-soft)' }}>
                    <FileText size={14} style={{ color: 'var(--ink-soft)', flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>{a.type}</div>
                      <div style={{ fontSize: 11, color: 'var(--ink-soft)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {a.name} · {formatFileSize(a.size)}
                      </div>
                    </div>
                    <button className="btn btn-sm btn-ghost" onClick={() => removeAttachment(i)}><Trash2 size={12} /></button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Recommendation list */}
          <div style={{ marginTop: 16, padding: 12, background: 'var(--bg-deep)', borderLeft: '3px solid var(--info)' }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--info)', marginBottom: 6, letterSpacing: '0.04em', textTransform: 'uppercase' }}>💡 Dokumen Wajib dari Klien (untuk verifikasi Admin)</div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', lineHeight: 1.6 }}>
              {VERIFY_CHECKLIST_STAGE2.filter(c => c.required).map(c => '• ' + c.label).join('\n').split('\n').map((line, i) => <div key={i}>{line}</div>)}
            </div>
          </div>
        </div>

        <div style={{ padding: '16px 28px', borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
          <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
            {attachments.length > 0 ? `${attachments.length} dokumen akan ter-attach` : 'Anda bisa upload dokumen nanti di detail job'}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn" onClick={onClose}>Batal</button>
            <button className="btn btn-primary" onClick={submit}><Plus size={14} /> Buat Job</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function VerificationPanel({ job, user, onUpdate }) {
  const [showRevisionDialog, setShowRevisionDialog] = useState(false);
  const [revisionNote, setRevisionNote] = useState('');

  const verification = job.verification || {};

  const checklistStatus = useMemo(() => {
    return VERIFY_CHECKLIST_STAGE2.map(item => {
      const hasDoc = item.docKey ? (job.documents || []).some(d => d.type === item.docKey) : true;
      const verStatus = verification[item.id]; // { status, notes, by, ts }
      const required = isItemRequired(item, job);
      return { ...item, hasDoc, verStatus, resolvedRequired: required };
    });
  }, [job, verification]);

  const requiredItems = checklistStatus.filter(i => i.resolvedRequired);
  const verifiedRequired = requiredItems.filter(i => i.verStatus?.status === 'verified').length;
  const allRequiredOK = verifiedRequired === requiredItems.length;

  const setItemStatus = async (itemId, status, notes = '') => {
    const updated = {
      ...job,
      verification: {
        ...verification,
        [itemId]: { status, notes, by: user.name, ts: new Date().toISOString() }
      }
    };
    await onUpdate(updated);
  };

  const completeVerification = async () => {
    if (!allRequiredOK) return;
    const missingNotes = checklistStatus
      .filter(i => i.verStatus?.notes)
      .map(i => `${i.label}: ${i.verStatus.notes}`)
      .join('; ');
    const updated = {
      ...job,
      stage: 3,
      stage_started_at: today(),
      verification_completed_at: today(),
      verification_completed_by: user.name,
      history: [...(job.history || []), {
        stage: 3, ts: today(), by: user.name,
        action: `Verifikasi dokumen SELESAI (${verifiedRequired}/${requiredItems.length} wajib OK). Lanjut ke Penjadwalan.${missingNotes ? ' Catatan: ' + missingNotes : ''}`
      }]
    };
    await onUpdate(updated);
  };

  const requestRevision = async () => {
    if (!revisionNote.trim()) {
      alert('Mohon isi catatan revisi untuk Marketing');
      return;
    }
    const missingItems = checklistStatus.filter(i => i.resolvedRequired && !i.hasDoc).map(i => i.label);
    const updated = {
      ...job,
      stage: 1,
      stage_started_at: today(),
      revision_requested: true,
      revision_note: revisionNote,
      revert_requested: undefined,  // clear MKT request flag if any
      history: [...(job.history || []), {
        stage: 1, ts: today(), by: user.name,
        action: `REVISI DIMINTA dari Admin: ${revisionNote}${missingItems.length ? ` (Belum ada: ${missingItems.join(', ')})` : ''}${job.revert_requested ? ' [Memenuhi request Marketing]' : ''}`
      }]
    };
    await onUpdate(updated);
    setShowRevisionDialog(false);
    setRevisionNote('');
  };

  return (
    <div>
      {/* Marketing revert request banner (priority) */}
      {job.revert_requested && (
        <div className="panel-soft" style={{ padding: 14, marginBottom: 16, background: 'rgba(180,83,9,0.08)', borderLeft: '3px solid var(--warn)' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
            <RotateCcw size={18} style={{ color: 'var(--warn)', flexShrink: 0, marginTop: 2 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--warn)' }}>📩 Marketing minta job dikembalikan ke Tahap 1</div>
              <div style={{ fontSize: 12, color: 'var(--ink)', marginTop: 6, lineHeight: 1.5 }}>
                <strong>{job.revert_requested.by}</strong> ({formatDate(job.revert_requested.ts.slice(0,10))}): "{job.revert_requested.reason}"
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 6 }}>
                Setujui dengan klik "Kembalikan ke Marketing" di bawah, atau abaikan jika tidak perlu.
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="panel-soft" style={{ padding: 16, marginBottom: 16, background: 'rgba(194, 65, 12, 0.04)', borderLeft: '3px solid var(--accent)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <ClipboardList size={20} style={{ color: 'var(--accent)', flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500, marginBottom: 4 }}>Verifikasi Kelengkapan Dokumen</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              Periksa setiap dokumen dari Marketing. Tandai <strong style={{ color: 'var(--ok)' }}>OK</strong> jika lengkap & benar, atau <strong style={{ color: 'var(--bad)' }}>Tidak Ada</strong> jika kurang. Setelah semua dokumen wajib OK, klik "Verifikasi Selesai" untuk lanjut ke Penjadwalan. Jika ada yang kurang, klik "Minta Revisi" untuk kirim balik ke Marketing.
            </div>
          </div>
        </div>
      </div>

      {/* Progress */}
      <div className="panel-soft" style={{ padding: 12, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600 }}>Progress Verifikasi</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
            <div style={{ flex: 1, height: 8, background: 'var(--bg-deep)', position: 'relative', border: '1px solid var(--line-soft)' }}>
              <div style={{ width: `${(verifiedRequired / requiredItems.length) * 100}%`, height: '100%', background: allRequiredOK ? 'var(--ok)' : 'var(--accent)', transition: 'width 0.3s' }} />
            </div>
            <div className="dnp-mono" style={{ fontSize: 13, fontWeight: 700, minWidth: 60, textAlign: 'right' }}>
              {verifiedRequired} / {requiredItems.length}
            </div>
          </div>
          <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4 }}>Dokumen wajib terverifikasi</div>
        </div>
      </div>

      {/* Checklist Table - in FM-PJK3-RIKU-009 style */}
      <div className="panel-soft" style={{ marginBottom: 16 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '40px 1fr 100px 220px', padding: '10px 14px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
          <div>No</div>
          <div>Dokumen</div>
          <div style={{ textAlign: 'center' }}>File</div>
          <div style={{ textAlign: 'center' }}>Status Verifikasi</div>
        </div>
        {checklistStatus.map((item, idx) => {
          const status = item.verStatus?.status;
          const isManual = item.manual === true; // Drawing-vs-Nameplate is a manual visual check, not a doc upload
          return (
            <div key={item.id} style={{
              display: 'grid', gridTemplateColumns: '40px 1fr 100px 220px',
              padding: '12px 14px',
              borderBottom: idx < checklistStatus.length - 1 ? '1px solid var(--line-soft)' : 'none',
              alignItems: 'center',
              background: status === 'verified' ? 'rgba(21,128,61,0.04)' : status === 'missing' ? 'rgba(153,27,27,0.04)' : 'transparent'
            }}>
              <div className="dnp-mono" style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 600 }}>{String(idx + 1).padStart(2, '0')}</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                  {item.label}
                  {item.resolvedRequired ? <span className="tag tag-bad" style={{ fontSize: 9, padding: '1px 5px' }}>WAJIB</span> : <span className="tag tag-slate" style={{ fontSize: 9, padding: '1px 5px' }}>OPSIONAL</span>}
                  {item.requiredIfPesawat && item.requiredIfPesawat.includes(job.pesawat) && (
                    <span className="tag tag-accent" style={{ fontSize: 9, padding: '1px 5px' }}>wajib utk {job.pesawat}</span>
                  )}
                  {item.conditionalDisnaker && needsPengesahan(job.disnaker_tujuan) === true && (
                    <span className="tag tag-accent" style={{ fontSize: 9, padding: '1px 5px' }}>wajib utk {job.disnaker_tujuan}</span>
                  )}
                  {isManual && <span className="tag tag-info" style={{ fontSize: 9, padding: '1px 5px' }}>CEK VISUAL</span>}
                </div>
                {item.note && <div style={{ fontSize: 11, color: 'var(--ink-faint)', fontStyle: 'italic', marginTop: 2 }}>{item.note}</div>}
                {item.verStatus?.notes && <div style={{ fontSize: 11, color: 'var(--accent)', marginTop: 4 }}>📝 {item.verStatus.notes}</div>}
              </div>
              <div style={{ textAlign: 'center' }}>
                {isManual ? (
                  <span className="tag tag-info" style={{ fontSize: 10 }}>MANUAL</span>
                ) : item.hasDoc ? (
                  <span className="tag tag-ok" style={{ fontSize: 10 }}><CheckCircle2 size={10} /> ADA</span>
                ) : (
                  <span className="tag tag-bad" style={{ fontSize: 10 }}><X size={10} /> KOSONG</span>
                )}
              </div>
              <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                <button
                  onClick={() => setItemStatus(item.id, 'verified')}
                  className="btn btn-sm"
                  style={{
                    background: status === 'verified' ? 'var(--ok)' : 'transparent',
                    color: status === 'verified' ? 'white' : 'var(--ok)',
                    borderColor: 'var(--ok)',
                    padding: '4px 8px', fontSize: 11
                  }}
                  disabled={!isManual && !item.hasDoc}
                  title={!isManual && !item.hasDoc ? 'Dokumen belum di-upload' : 'Tandai OK'}>
                  <CheckCircle2 size={11} /> OK
                </button>
                <button
                  onClick={() => {
                    const note = prompt('Catatan kekurangan (akan dikirim ke Marketing):', item.verStatus?.notes || '');
                    if (note !== null) setItemStatus(item.id, 'missing', note);
                  }}
                  className="btn btn-sm"
                  style={{
                    background: status === 'missing' ? 'var(--bad)' : 'transparent',
                    color: status === 'missing' ? 'white' : 'var(--bad)',
                    borderColor: 'var(--bad)',
                    padding: '4px 8px', fontSize: 11
                  }}>
                  <X size={11} /> Tidak
                </button>
                {!item.resolvedRequired && (
                  <button

      {/* Action Buttons */}

        <button

          onClick={completeVerification}

          title={!allRequiredOK ? `Verifikasi ${requiredItems.length - verifiedRequired} dokumen wajib lagi` : 'Lanjut ke Penjadwalan'}>

              <textarea

              <button className="btn btn-danger" onClick={requestRevision}>
                <RotateCcw size={12} /> Kirim Revisi
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

// STAGE 3 - SCHEDULING PANEL (Admin)
// ============================================================

function SchedulingPanel({ job, user, allJobs = [], onUpdate }) {
  const [tgl, setTgl] = useState(job.tgl_pelaksanaan || '');
  const [jamMulai, setJamMulai] = useState(job.jam_mulai || '08:00');
  const [durasi, setDurasi] = useState(job.durasi_hari || 1);
  const [selectedInspekturIds, setSelectedInspekturIds] = useState(job.inspektur_ids || []);
  const [selectedAlatIds, setSelectedAlatIds] = useState(job.alat_ids || []);
  const [selectedCertIds, setSelectedCertIds] = useState(job.cert_ids || []);
  const [disnaker, setDisnaker] = useState(job.disnaker_tujuan || '');

  const requiredSpec = PESAWAT_SPESIALISASI[job.pesawat] || [];

  // Suggested alat: kategori match dengan jenis pesawat
  const suggestedAlat = useMemo(() => {
    return ALAT_INVENTORY.filter(a => a.kategori.includes(job.pesawat) || a.kategori.includes(requiredSpec[0]));
  }, [requiredSpec, job.pesawat]);

  // Suggested certs: kategori match dengan jenis pesawat (always include 'umum' SK Kemnaker)
  const suggestedCerts = useMemo(() => {
    return PJK3_CERTS.filter(c => c.kategori === 'umum' || requiredSpec.includes(c.kategori) || c.kategori === job.pesawat);
  }, [requiredSpec, job.pesawat]);

  const toggleAlat = (id) => {
    const alat = ALAT_INVENTORY.find(a => a.id === id);
    if (!alat) return;
    // HARD LOCK: alat dengan kalibrasi expired tidak boleh dipilih (kepatuhan SOP)
    const kalDays = daysBetween(today(), alat.kalibrasi_expired);
    if (kalDays < 0) {
      alert(`Alat "${alat.nama}" tidak dapat dipilih.\n\nMasa kalibrasi sudah expired sejak ${formatDate(alat.kalibrasi_expired)} (${Math.abs(kalDays)} hari lalu).\n\nSesuai SOP, hanya alat dengan kalibrasi valid yang boleh digunakan untuk Riksa Uji. Hubungi Kadiv RU untuk re-kalibrasi.`);
      return;
    }
    if (alat.status !== 'tersedia') {
      alert(`Alat "${alat.nama}" sedang dipakai oleh tim lain. Cek ketersediaan di menu "Alat & SKP".`);
      return;
    }
    setSelectedAlatIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };
  const toggleCert = (id) => {
    const cert = PJK3_CERTS.find(c => c.id === id);
    if (cert && daysBetween(today(), cert.expired) < 0) {
      alert(`Sertifikat "${cert.nama}" sudah EXPIRED sejak ${formatDate(cert.expired)}.\n\nSertifikat PJK3 yang expired tidak boleh digunakan sebagai lampiran legal ke Disnaker. Hubungi Manager untuk perpanjangan ke Kemnaker RI.`);
      return;
    }
    setSelectedCertIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  // Suggested = inspektur with at least one of the required specs
  const suggestedInspektur = useMemo(() => {
    return INSPEKTUR_LIST.filter(i =>
      i.active && i.spesialisasi.some(s => requiredSpec.includes(s))
    );
  }, [requiredSpec]);

  const otherInspektur = useMemo(() => {
    return INSPEKTUR_LIST.filter(i =>
      i.active && !i.spesialisasi.some(s => requiredSpec.includes(s))
    );
  }, [requiredSpec]);

  const toggleInspektur = (id) => {
    const insp = INSPEKTUR_LIST.find(i => i.id === id);
    if (!insp) return;

    // Allow deselection without check
    if (selectedInspekturIds.includes(id)) {
      setSelectedInspekturIds(prev => prev.filter(x => x !== id));
      return;
    }

    // HARD LOCK 1: SKP expired
    if (insp.skp_expired) {
      const skpDays = daysBetween(today(), insp.skp_expired);
      if (skpDays < 0) {
        alert(`${insp.nama} tidak dapat ditugaskan.\n\nSKP Ahli K3 sudah expired sejak ${formatDate(insp.skp_expired)} (${Math.abs(skpDays)} hari lalu).\n\nSesuai SOP & regulasi Kemnaker, hanya Ahli K3 dengan SKP valid yang boleh melakukan riksa uji. Hubungi Manager untuk perpanjangan SKP ke Kemnaker RI.`);
        return;
      }
      if (skpDays < 90) {
        if (!confirm(`⚠ ${insp.nama}: SKP berlaku hanya ${skpDays} hari lagi (sampai ${formatDate(insp.skp_expired)}).\n\nBerisiko jika pelaksanaan riksa uji atau penyusunan LHPP melewati masa berlaku. Tetap tugaskan?`)) return;
      }
    }

    // HARD LOCK 2: Schedule conflict (kalau tanggal sudah diset)
    if (tgl && hasScheduleConflict(insp.id, insp.nama, tgl, durasi, allJobs, job.id)) {
      if (!confirm(`⚠ ${insp.nama} sudah ditugaskan di job lain pada tanggal ${formatDate(tgl)}.\n\nIni bisa menimbulkan bentrok jadwal. Tetap tugaskan?`)) return;
    }

    setSelectedInspekturIds(prev => [...prev, id]);
  };

  // H-5 calculation
  const h5Date = useMemo(() => {
    if (!tgl) return null;
    const d = new Date(tgl);
    d.setDate(d.getDate() - 5);
    return d.toISOString().slice(0, 10);
  }, [tgl]);

  const h5Status = useMemo(() => {
    if (!h5Date) return null;
    const days = daysBetween(today(), h5Date);
    if (days < 0) return { type: 'late', msg: `Sudah lewat ${Math.abs(days)} hari — Surat Pemberitahuan TERLAMBAT` };
    if (days === 0) return { type: 'urgent', msg: 'HARI INI batas kirim Surat Pemberitahuan H-5' };
    if (days <= 2) return { type: 'warn', msg: `${days} hari lagi kirim Surat Pemberitahuan H-5` };
    return { type: 'ok', msg: `${days} hari lagi (jadwal sehat)` };
  }, [h5Date]);

  // Status of scheduling sub-steps
  const stHasBeenIssued = !!job.no_surat_tugas;
  const h5Confirmed = !!job.h5_confirmed;

  const canSchedule = tgl && selectedInspekturIds.length > 0;
  const canAdvanceToS4 = stHasBeenIssued && h5Confirmed;

  const issueSuratTugas = async () => {
    if (!canSchedule) {
      alert('Mohon isi tanggal pelaksanaan dan pilih minimal 1 inspektur.');
      return;
    }
    const inspekturObjs = INSPEKTUR_LIST.filter(i => selectedInspekturIds.includes(i.id));
    const inspekturNames = inspekturObjs.map(i => i.nama).join(', ');
    const stSeq = String(Date.now()).slice(-4);
    const stNo = `ST-DNP/${new Date().getFullYear()}/${stSeq}`;

    const updated = {
      ...job,
      // STAY in stage 3 - just record the scheduling info
      tgl_pelaksanaan: tgl,
      jam_mulai: jamMulai,
      durasi_hari: Number(durasi) || 1,
      inspektur_ids: selectedInspekturIds,
      inspektur: inspekturNames,
      alat_ids: selectedAlatIds,
      cert_ids: selectedCertIds,
      no_surat_tugas: stNo,
      tgl_surat_tugas: today(),
      disnaker_tujuan: disnaker,
      tgl_h5: h5Date,
      history: [...(job.history || []), {
        stage: 3, ts: today(), by: user.name,
        action: `Surat Tugas terbit (${stNo}). Jadwal: ${formatDate(tgl)} ${jamMulai}. Inspektur: ${inspekturNames}. ${selectedAlatIds.length} alat, ${selectedCertIds.length} sertifikat dilampirkan. Menunggu konfirmasi H-5 Teman K3.`
      }]
    };
    await onUpdate(updated);
  };

  // Print/Download Surat Tugas as HTML (printable in browser)
  const printSuratTugas = () => {
    const inspekturObjs = INSPEKTUR_LIST.filter(i => selectedInspekturIds.includes(i.id));
    const alatObjs = ALAT_INVENTORY.filter(a => selectedAlatIds.includes(a.id));
    const certObjs = PJK3_CERTS.filter(c => selectedCertIds.includes(c.id));
    const pesawat = PESAWAT_TYPES.find(p => p.code === job.pesawat);

    const html = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>${job.no_surat_tugas} - Surat Tugas</title>
<style>
  @page { size: A4; margin: 2.5cm; }
  body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; color: #000; }
  .header { text-align: center; border-bottom: 3px double #000; padding-bottom: 12px; margin-bottom: 20px; }
  .header h1 { font-size: 14pt; margin: 0; font-weight: bold; letter-spacing: 0.05em; }
  .header h2 { font-size: 18pt; margin: 8px 0 4px; font-weight: bold; text-decoration: underline; }
  .header .nostr { font-size: 11pt; margin-top: 4px; }
  .section { margin: 16px 0; }
  .section h3 { font-size: 12pt; font-weight: bold; text-decoration: underline; margin: 12px 0 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 11pt; }

                          {calStatus === 'expired' ? `EXPIRED ${formatDate(a.kalibrasi_expired)}` : `Kal: ${formatDate(a.kalibrasi_expired)}`}
                        </span>
                        {a.status === 'sedang dipakai' && <span className="tag tag-warn" style={{ fontSize: 9 }}>SEDANG DIPAKAI</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* PJK3 Certs */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--accent)', marginBottom: 6, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
            <Award size={11} style={{ verticalAlign: -1, marginRight: 4 }} /> Sertifikat PJK3 yang Disarankan
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {suggestedCerts.map(c => {
              const isSelected = selectedCertIds.includes(c.id);
              const certExpired = daysBetween(today(), c.expired);
              const certStatus = certExpired < 0 ? 'expired' : certExpired < 90 ? 'expiring' : 'valid';
              return (
                <div key={c.id} onClick={() => toggleCert(c.id)}
                  style={{
                    padding: 10, border: '1px solid ' + (isSelected ? 'var(--accent)' : 'var(--line-soft)'),
                    background: isSelected ? 'rgba(194,65,12,0.06)' : 'var(--bg-card)',
                    cursor: 'pointer',
                    display: 'flex', gap: 8, alignItems: 'flex-start'
                  }}>
                  <div style={{
                    width: 16, height: 16, border: '2px solid ' + (isSelected ? 'var(--accent)' : 'var(--line)'),
                    background: isSelected ? 'var(--accent)' : 'transparent',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2
                  }}>
                    {isSelected && <CheckCircle2 size={10} style={{ color: 'white' }} />}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{c.nama}</div>
                    <div className="dnp-mono" style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 2 }}>{c.no}</div>
                    <div style={{ marginTop: 4 }}>
                      <span className={`tag ${certStatus === 'expired' ? 'tag-bad' : certStatus === 'expiring' ? 'tag-warn' : 'tag-ok'}`} style={{ fontSize: 9 }}>
                        Berlaku sd: {formatDate(c.expired)}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Preview Surat Tugas */}
      {canSchedule && !stHasBeenIssued && (
        <div className="panel-soft" style={{ padding: 14, marginBottom: 16, background: 'var(--bg-deep)', borderStyle: 'dashed' }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 8 }}>
            Preview Surat Tugas (otomatis ter-generate saat diterbitkan)
          </div>
          <div style={{ fontSize: 12, lineHeight: 1.6, fontFamily: 'JetBrains Mono, monospace' }}>
            No. Surat Tugas : ST-DNP/{new Date().getFullYear()}/XXXX<br />
            Klien           : {job.klien}<br />
            Lokasi          : {job.lokasi}<br />
            Pesawat         : {PESAWAT_TYPES.find(p => p.code === job.pesawat)?.name} × {job.units} unit<br />
            Tgl Pelaksanaan : {formatDate(tgl)} pukul {jamMulai} ({durasi} hari)<br />
            Inspektur       : {INSPEKTUR_LIST.filter(i => selectedInspekturIds.includes(i.id)).map(i => i.nama).join(', ')}<br />
            Alat            : {selectedAlatIds.length} unit terkalibrasi<br />
            Sertifikat      : {selectedCertIds.length} dokumen pendukung<br />
            H-5 Notif Disnaker: {formatDate(h5Date)}
          </div>
        </div>
      )}

      {/* STEP 1: Issue Surat Tugas */}
      {!stHasBeenIssued ? (
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button
            className="btn btn-primary"
            onClick={issueSuratTugas}
            disabled={!canSchedule}
            title={!canSchedule ? 'Isi tanggal & pilih inspektur dulu' : 'Generate Surat Tugas'}>
            <FileCheck size={14} /> Step 1: Terbitkan Surat Tugas
          </button>
        </div>
      ) : (
        <div className="panel-soft" style={{ padding: 14, marginBottom: 16, background: 'rgba(21,128,61,0.04)', borderLeft: '3px solid var(--ok)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <CheckCircle2 size={16} style={{ color: 'var(--ok)' }} />
                <div className="dnp-mono" style={{ fontSize: 13, fontWeight: 600 }}>Surat Tugas {job.no_surat_tugas} sudah terbit</div>
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4, paddingLeft: 24 }}>Terbit: {formatDate(job.tgl_surat_tugas)} · Inspektur: {job.inspektur} · {(job.alat_ids || []).length} alat, {(job.cert_ids || []).length} sertifikat</div>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className="btn btn-sm" onClick={printSuratTugas}>
                <Printer size={12} /> Surat Tugas Saja
              </button>
              <button className="btn btn-sm" onClick={printPaketDokumen} style={{ background: '#0D9488', color: 'white', borderColor: '#0D9488' }}>
                <Package size={12} /> Paket Dokumen Lapangan
              </button>
            </div>
          </div>
        </div>
      )}

      {/* STEP 2: H-5 Teman K3 Confirmation Gate (mandatory before Stage 4) */}
      {stHasBeenIssued && (
        <div className="panel-soft" style={{ padding: 16, marginBottom: 16, borderColor: h5Confirmed ? 'var(--ok)' : 'var(--bad)', borderWidth: 2 }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 }}>
            <Bell size={20} style={{ color: h5Confirmed ? 'var(--ok)' : 'var(--bad)', flexShrink: 0, marginTop: 2 }} />
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Step 2: Konfirmasi H-5 Teman K3</div>
                {h5Confirmed && <span className="tag tag-ok" style={{ fontSize: 10 }}><CheckCircle2 size={10} /> TERKIRIM</span>}
                {!h5Confirmed && <span className="tag tag-bad" style={{ fontSize: 10 }}>WAJIB</span>}
              </div>
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 4, lineHeight: 1.5 }}>
                SOP mewajibkan Surat Pemberitahuan Riksa Uji H-5 dikirim ke Disnaker sebelum pelaksanaan. Konfirmasi metode yang digunakan:
              </div>
            </div>
          </div>

          {!h5Confirmed ? (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <button className="btn" onClick={() => setH5Method('teman_k3')} style={{ padding: '14px', flexDirection: 'column', gap: 4 }}>
                <Database size={18} style={{ color: 'var(--accent)' }} />
                <div style={{ fontSize: 13, fontWeight: 600 }}>Via Sistem Teman K3</div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Upload bukti submit di tab Dokumen</div>
              </button>
              <button className="btn" onClick={() => setH5Method('manual')} style={{ padding: '14px', flexDirection: 'column', gap: 4 }}>
                <FileText size={18} style={{ color: 'var(--accent)' }} />
                <div style={{ fontSize: 13, fontWeight: 600 }}>Manual ke Disnaker</div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Hardcopy / email ke kantor Disnaker</div>
              </button>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 12px', background: 'rgba(21,128,61,0.06)', border: '1px solid var(--ok)' }}>
              <div style={{ fontSize: 12 }}>
                ✓ H-5 dikonfirmasi via <strong>{job.h5_method === 'teman_k3' ? 'Sistem Teman K3' : 'Manual ke Disnaker'}</strong> pada {formatDate(job.h5_confirmed_at)} oleh {job.h5_confirmed_by}
              </div>
              <button className="btn btn-sm btn-ghost" onClick={unsetH5}><X size={12} /> Batal</button>
            </div>
          )}

          {h5Confirmed && job.h5_method === 'teman_k3' && (
            <div style={{ fontSize: 11, color: 'var(--accent)', marginTop: 8, padding: '6px 10px', background: 'rgba(194,65,12,0.06)' }}>
              💡 Jangan lupa upload screenshot bukti submit Teman K3 di tab "Dokumen" → kategori "Surat Pemberitahuan H-5"
            </div>
          )}
        </div>
      )}

      {/* STEP 3: Advance to Stage 4 (only if both above complete) */}
      {stHasBeenIssued && (
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button
            className="btn btn-primary"
            onClick={confirmH5AndAdvance}
            disabled={!canAdvanceToS4}
            title={!canAdvanceToS4 ? 'Konfirmasi H-5 dulu sebelum lanjut' : 'Pindahkan ke Tahap 4'}>
            <ArrowRight size={14} /> Step 3: Mulai Pelaksanaan RU (Tahap 4)
          </button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// STAGE 4 - FIELD EXECUTION PANEL (Inspektur)
// ============================================================

const FIELD_CHECKLIST_DEFAULT = [
  { id: 'nameplate', label: 'Verifikasi Nameplate (foto + cocokkan dengan dokumen)', critical: true },
  { id: 'visual',    label: 'Pemeriksaan Visual: korosi, retak, kebocoran, deformasi', critical: true },
  { id: 'dimensi',   label: 'Pengukuran Dimensi & Ketebalan Material', critical: false },
  { id: 'kelistrikan', label: 'Pemeriksaan Sistem Kelistrikan & Grounding (jika applicable)', critical: false },
  { id: 'pengaman', label: 'Test Fungsi Alat Pengaman (safety valve, limit switch, dll)', critical: true },
  { id: 'fungsi',    label: 'Test Fungsi Operasional (load test / pressure test / functional test)', critical: true },
  { id: 'apd',       label: 'APD lengkap digunakan selama pengujian', critical: false },
  { id: 'bap',       label: 'BAP ditandatangani oleh PIC Klien di lapangan', critical: true },
];

function FieldExecutionPanel({ job, user, onUpdate }) {
  const fileRef = useRef(null);
  const [pickType, setPickType] = useState('Foto Nameplate');

  const checklist = job.field_checklist || {};
  const isMine = (job.inspektur_ids || []).some(id => {
    const insp = INSPEKTUR_LIST.find(i => i.id === id);
    return insp?.nama === user.name;
  }) || (job.inspektur || '').includes(user.name);

  const fotoDocs = (job.documents || []).filter(d => d.stage === 4 && (d.type?.startsWith('Foto') || d.mime?.startsWith('image/')));
  const otherDocs = (job.documents || []).filter(d => d.stage === 4 && !(d.type?.startsWith('Foto') || d.mime?.startsWith('image/')));

  const checklistDone = FIELD_CHECKLIST_DEFAULT.filter(c => checklist[c.id]?.done).length;
  const criticalRemaining = FIELD_CHECKLIST_DEFAULT.filter(c => c.critical && !checklist[c.id]?.done).length;

  const toggleCheck = async (itemId, currentVal) => {
    const next = {
      ...checklist,
      [itemId]: currentVal?.done
        ? undefined
        : { done: true, by: user.name, ts: new Date().toISOString() }
    };
    // Clean undefined
    Object.keys(next).forEach(k => { if (next[k] === undefined) delete next[k]; });
    await onUpdate({ ...job, field_checklist: next });
  };

  const addNote = async (itemId) => {
    const note = prompt('Catatan untuk item ini:', checklist[itemId]?.note || '');
    if (note === null) return;
    const next = {
      ...checklist,
      [itemId]: { ...(checklist[itemId] || {}), note, by: user.name, ts: new Date().toISOString() }
    };
    await onUpdate({ ...job, field_checklist: next });
  };

  const handlePhotoSelect = (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    files.forEach(file => {
      if (file.size > MAX_FILE_SIZE) {
        alert(`${file.name} terlalu besar (${formatFileSize(file.size)}). Max ${formatFileSize(MAX_FILE_SIZE)}/file.`);
        return;
      }
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const newDoc = {
          stage: 4, type: pickType, name: file.name,
          size: file.size, mime: file.type,
          uploaded_at: today(), by: user.name,
          data_url: ev.target.result,
        };
        const updated = {
          ...job,
          documents: [...(job.documents || []), newDoc],
          history: [...(job.history || []), {
            stage: 4, ts: today(), by: user.name,
            action: `Upload ${pickType}: ${file.name}`
          }]
        };
        await onUpdate(updated);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const advanceToStage5 = async () => {
    if (criticalRemaining > 0) {
      if (!confirm(`Masih ada ${criticalRemaining} item KRITIS yang belum dicentang. Yakin lanjut ke Penyusunan LHPP?`)) return;
    }
    if (fotoDocs.length === 0) {
      if (!confirm('Belum ada foto dokumentasi. Yakin lanjut ke Penyusunan LHPP?')) return;
    }
    await onUpdate({
      ...job,
      stage: 5,
      stage_started_at: today(),
      field_completed_at: today(),
      field_completed_by: user.name,
      history: [...(job.history || []), {
        stage: 5, ts: today(), by: user.name,
        action: `Pelaksanaan lapangan SELESAI. ${checklistDone}/${FIELD_CHECKLIST_DEFAULT.length} checklist OK, ${fotoDocs.length} foto, ${otherDocs.length} dokumen lainnya. Mulai penyusunan LHPP.`
      }]
    });
  };

  return (
    <div>
      {/* Header */}
      <div className="panel-soft" style={{ padding: 16, marginBottom: 16, background: 'rgba(194, 65, 12, 0.04)', borderLeft: '3px solid var(--accent)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <HardHat size={20} style={{ color: 'var(--accent)', flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
              <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Pelaksanaan Riksa Uji di Lapangan</div>
              {job.no_surat_tugas && (
                <button className="btn btn-sm" onClick={() => {
                  // Reuse the print template (simplified version inline)
                  const w = window.open('', '_blank');
                  if (!w) { alert('Pop-up diblokir.'); return; }
                  const inspekturObjs = INSPEKTUR_LIST.filter(i => (job.inspektur_ids || []).includes(i.id));
                  const alatObjs = ALAT_INVENTORY.filter(a => (job.alat_ids || []).includes(a.id));
                  const pesawat = PESAWAT_TYPES.find(p => p.code === job.pesawat);
                  w.document.write(`<!DOCTYPE html><html><head><title>${job.no_surat_tugas}</title>
<style>@page{size:A4;margin:2.5cm}body{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.5}
.header{text-align:center;border-bottom:3px double #000;padding-bottom:12px;margin-bottom:20px}
.header h2{font-size:18pt;margin:8px 0 4px;text-decoration:underline}
table{width:100%;border-collapse:collapse;font-size:11pt}td{padding:4px 8px;vertical-align:top}
table.b td,table.b th{border:1px solid #000;padding:6px}table.b th{background:#f0f0f0;text-align:center}
.np{background:#fffbeb;padding:12px;border:1px solid #fbbf24;margin-bottom:16px;font-family:sans-serif}
@media print{.np{display:none}}</style></head><body>
<div class="np">📄 Tekan Ctrl+P / Cmd+P untuk cetak/save PDF.</div>
<div class="header"><h1>PT DELTA NUSANTARA PERSADA</h1><h2>SURAT TUGAS</h2><div>No: ${job.no_surat_tugas}</div></div>
<p>Menugaskan:</p>
${inspekturObjs.map((i,idx) => `<p style="margin-left:24px">${idx+1}. <strong>${i.nama}</strong> — ${i.skp}</p>`).join('')}
<p>Untuk melaksanakan Riksa Uji:</p>
<table style="margin-left:24px"><tr><td style="width:180px">Klien</td><td>:</td><td><strong>${job.klien}</strong></td></tr>
<tr><td>Lokasi</td><td>:</td><td>${job.lokasi}</td></tr>
<tr><td>PIC Klien</td><td>:</td><td>${job.pic_klien || '—'} (${job.pic_klien_phone || '—'})</td></tr>
<tr><td>Pesawat</td><td>:</td><td>${pesawat?.name} × ${job.units} unit</td></tr>
<tr><td>Tgl Pelaksanaan</td><td>:</td><td>${formatDate(job.tgl_pelaksanaan)} pukul ${job.jam_mulai || '08:00'}</td></tr></table>
${alatObjs.length > 0 ? `<h3>Peralatan:</h3><table class="b"><tr><th>No</th><th>Alat</th><th>Serial</th><th>Kalibrasi sd</th></tr>
${alatObjs.map((a,i) => `<tr><td>${i+1}</td><td>${a.nama} (${a.merk})</td><td>${a.serial}</td><td>${formatDate(a.kalibrasi_expired)}</td></tr>`).join('')}</table>` : ''}
<div style="margin-top:60px;text-align:right"><p>Bekasi, ${formatDate(job.tgl_surat_tugas)}<br/>Manager Operasional<br/><br/><br/><br/><strong style="text-decoration:underline">Terzha R. Perdanawan</strong></p></div>
</body></html>`);
                  w.document.close();
                }}>
                  <Printer size={12} /> Surat Tugas
                </button>
              )}
            </div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5, marginTop: 4 }}>
              {isMine ? 'Upload foto langsung dari HP, isi checklist visual, dan upload BAP yang sudah ditandatangani PIC Klien.' : '⚠ Anda bukan inspektur yang ditugaskan. Hanya bisa view.'}
            </div>
            {job.tgl_pelaksanaan && (
              <div style={{ fontSize: 11, color: 'var(--ink)', marginTop: 8, padding: '6px 10px', background: 'var(--bg-deep)', display: 'inline-block' }}>
                <strong>Jadwal:</strong> {formatDate(job.tgl_pelaksanaan)} pukul {job.jam_mulai || '08:00'} ({job.durasi_hari || 1} hari)
                {job.no_surat_tugas && <> · ST: <span className="dnp-mono">{job.no_surat_tugas}</span></>}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Brief klien & alat info */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
        <div className="panel-soft" style={{ padding: 14 }}>
          <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 6 }}>Info Klien & PIC</div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>{job.klien}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>📍 {job.lokasi}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 6 }}>
            PIC: <strong style={{ color: 'var(--ink)' }}>{job.pic_klien || '—'}</strong>
          </div>
          {job.pic_klien_phone && (
            <a href={`tel:${job.pic_klien_phone.replace(/\D/g, '')}`}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 4, marginTop: 4, padding: '4px 8px', background: 'var(--ok)', color: 'white', fontSize: 11, fontFamily: 'JetBrains Mono, monospace', textDecoration: 'none' }}>
              📞 {job.pic_klien_phone}
            </a>
          )}
        </div>
        <div className="panel-soft" style={{ padding: 14 }}>
          <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 6 }}>Alat yang Disiapkan Admin RU</div>
          {(job.alat_ids || []).length === 0 ? (
            <div style={{ fontSize: 11, color: 'var(--ink-faint)', fontStyle: 'italic' }}>Belum ada alat dipilih dari inventaris.</div>
          ) : (
            <div style={{ fontSize: 11, lineHeight: 1.5 }}>
              {(job.alat_ids || []).map(id => {
                const a = ALAT_INVENTORY.find(x => x.id === id);
                if (!a) return null;
                return (
                  <div key={id} style={{ marginTop: 2 }}>
                    • {a.nama} <span className="dnp-mono" style={{ color: 'var(--ink-soft)' }}>({a.serial})</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Digital Checklist */}
      <div className="panel-soft" style={{ marginBottom: 16 }}>
        <div style={{ padding: '10px 14px', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Digital Checklist Lapangan</div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>
              {checklistDone} dari {FIELD_CHECKLIST_DEFAULT.length} item dicentang
              {criticalRemaining > 0 && <span style={{ color: 'var(--bad)' }}> · {criticalRemaining} item kritis belum dicek</span>}
            </div>
          </div>
          <div style={{ width: 100, height: 6, background: 'var(--bg-card)', border: '1px solid var(--line-soft)', position: 'relative' }}>
            <div style={{
              width: `${(checklistDone / FIELD_CHECKLIST_DEFAULT.length) * 100}%`,
              height: '100%',
              background: criticalRemaining === 0 ? 'var(--ok)' : 'var(--accent)',
              transition: 'width 0.3s'
            }} />
          </div>
        </div>
        {FIELD_CHECKLIST_DEFAULT.map((item, idx) => {
          const status = checklist[item.id];
          const done = !!status?.done;
          return (
            <div key={item.id} style={{
              padding: '12px 14px',
              borderBottom: idx < FIELD_CHECKLIST_DEFAULT.length - 1 ? '1px solid var(--line-soft)' : 'none',
              display: 'flex', alignItems: 'center', gap: 12,
              background: done ? 'rgba(21,128,61,0.04)' : 'transparent',
              cursor: isMine ? 'pointer' : 'default',
            }}
            onClick={() => isMine && toggleCheck(item.id, status)}>
              <div style={{
                width: 22, height: 22, border: '2px solid ' + (done ? 'var(--ok)' : item.critical ? 'var(--bad)' : 'var(--line)'),
                background: done ? 'var(--ok)' : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
              }}>
                {done && <CheckCircle2 size={14} style={{ color: 'white' }} />}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 13, fontWeight: 500, textDecoration: done ? 'line-through' : 'none', color: done ? 'var(--ink-soft)' : 'var(--ink)' }}>
                    {item.label}
                  </span>
                  {item.critical && <span className="tag tag-bad" style={{ fontSize: 9, padding: '1px 5px' }}>KRITIS</span>}
                </div>
                {status?.note && <div style={{ fontSize: 11, color: 'var(--accent)', marginTop: 4 }}>📝 {status.note}</div>}
                {done && <div style={{ fontSize: 10, color: 'var(--ink-faint)', marginTop: 2 }}>Oleh {status.by} · {formatDateTime(status.ts)}</div>}
              </div>
              {isMine && (
                <button className="btn btn-sm btn-ghost" onClick={(e) => { e.stopPropagation(); addNote(item.id); }} title="Tambah catatan">
                  📝
                </button>
              )}
            </div>
          );
        })}

      {/* Photo & Document Upload */}
      <div className="panel-soft" style={{ marginBottom: 16, padding: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>📸 Dokumentasi Lapangan</div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>
              {fotoDocs.length} foto · {otherDocs.length} dokumen lain · langsung dari HP
            </div>
          </div>
          {isMine && (
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <select className="inp" value={pickType} onChange={e => setPickType(e.target.value)} style={{ width: 200, padding: '4px 8px', fontSize: 12 }}>
                <option>Foto Nameplate</option>
                <option>Foto Kondisi Fisik</option>
                <option>Foto Hasil Pengukuran</option>
                <option>Foto Alat Pengaman</option>
                <option>Foto APD & Tim di Lokasi</option>
                <option>Foto Dokumentasi Lapangan</option>
                <option>BAP (scan tertandatangani)</option>
                <option>Data Pengukuran (file)</option>
              </select>
              <button className="btn btn-primary btn-sm" onClick={() => fileRef.current?.click()}>
                <Upload size={12} /> Upload
              </button>
              <input ref={fileRef} type="file" multiple style={{ display: 'none' }} onChange={handlePhotoSelect}
                accept="image/*,application/pdf,.doc,.docx" capture="environment" />
            </div>
          )}
        </div>

        {/* Photo grid gallery */}
        {fotoDocs.length === 0 && otherDocs.length === 0 ? (
          <div style={{
            padding: 24, border: '2px dashed var(--line-soft)',
            textAlign: 'center', fontSize: 12, color: 'var(--ink-soft)'
          }}>
            <Upload size={24} style={{ opacity: 0.4, marginBottom: 6 }} /><br />
            Belum ada dokumentasi lapangan. Upload foto langsung dari HP (browser akan tawarkan kamera).
          </div>
        ) : (
          <>
            {fotoDocs.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-soft)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Foto ({fotoDocs.length})</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: 8 }}>
                  {fotoDocs.map((d, di) => {
                    const realIdx = job.documents.indexOf(d);
                    return (
                      <div key={di} style={{ border: '1px solid var(--line-soft)', overflow: 'hidden', background: 'var(--bg-deep)' }}>
                        {d.data_url ? (
                          <a href={d.data_url} target="_blank" rel="noopener noreferrer">
                            <img src={d.data_url} alt={d.name} style={{ width: '100%', height: 120, objectFit: 'cover', display: 'block' }} />

                        ) : (
                          <div style={{ height: 120, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: 'var(--ink-faint)' }}>(no preview)</div>
                        )}
                        <div style={{ padding: '6px 8px', fontSize: 10 }}>
                          <div style={{ fontWeight: 600 }}>{d.type}</div>
                          <div style={{ color: 'var(--ink-soft)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: 2 }}>
                            {d.name}
                          </div>
                          <div style={{ color: 'var(--ink-faint)', marginTop: 2, fontFamily: 'JetBrains Mono, monospace' }}>
                            {formatFileSize(d.size)} · {formatDate(d.uploaded_at)}
                          </div>
                          {isMine && (
                            <button className="btn btn-sm btn-ghost" style={{ padding: '2px 6px', fontSize: 10, marginTop: 4 }}
                              onClick={async () => {
                                if (!confirm('Hapus foto ini?')) return;
                                const newDocs = job.documents.filter((_, i) => i !== realIdx);
                                await onUpdate({ ...job, documents: newDocs });

            {otherDocs.length > 0 && (
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-soft)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Dokumen Lain ({otherDocs.length})</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {otherDocs.map((d, di) => {
                    const realIdx = job.documents.indexOf(d);
                    return (
                      <div key={di} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', background: 'var(--bg-card)', border: '1px solid var(--line-soft)' }}>

                          if (!confirm('Hapus dokumen?')) return;
                          const newDocs = job.documents.filter((_, i) => i !== realIdx);
                          await onUpdate({ ...job, documents: newDocs });

      {/* Advance button */}
      {isMine && (
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="btn btn-primary" onClick={advanceToStage5}>
            <CheckCircle2 size={14} /> Selesai Lapangan · Mulai Susun LHPP <ArrowRight size={14} />
