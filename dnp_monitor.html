Object.assign(window, {

  HardHat, ClipboardList, ChevronLeft, Activity, AlertCircle,
  Printer, Wrench, BriefcaseBusiness, Boxes, Award
});

window.storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v ? { value: JSON.parse(v) } : null;
    } catch(e) { return null; }
  },
  async set(key, val) {
    try {
      const payload = (val && typeof val === 'object' && 'value' in val) ? val.value : val;
      localStorage.setItem(key, JSON.stringify(payload));
      return true;
    } catch(e) { return false; }
  },
  async delete(key) {
    try { localStorage.removeItem(key); return true; } catch(e) { return false; }
  },
};

window.__DNP_READY__ = true;
window.dispatchEvent(new Event('dnp:ready'));

  if (item.required === true) return true;
  if (item.required === false) return false;
  if (item.requiredIfPesawat && item.requiredIfPesawat.includes(job.pesawat)) return true;
  if (item.conditionalDisnaker) {
    const result = needsPengesahan(job.disnaker_tujuan);
    if (result === true) return true;
    return false;
  }
  return false;
}

const today = () => new Date().toISOString().slice(0, 10);
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 86400000);
const formatRp = (n) => 'Rp ' + Number(n || 0).toLocaleString('id-ID');

function generateKode(seq) {
  const y = new Date().getFullYear();
  return `DNP/${y}/${String(seq).padStart(4, '0')}`;
}

function jobStatus(job) {
  if (job.stage === 7 && job.completed_at) return 'completed';
  const stageInfo = STAGES.find(s => s.id === job.stage);
  if (!stageInfo?.sla) return 'on_track';
  let sla = stageInfo.sla;
  // Stage 5 SLA is per-unit
  if (job.stage === 5) sla = sla * (job.units || 1);
  const days = daysBetween(job.stage_started_at, today());
  if (days > sla) return 'overdue';
  if (days >= sla - 1) return 'warning';
  return 'on_track';
}

function suketStatus(job) {
  if (!job.suket_expired_at) return null;
  const days = daysBetween(today(), job.suket_expired_at);
  if (days < 0) return 'expired';
  if (days <= 90) return 'expiring_soon';
  return 'valid';
}

// ============================================================
// INSPECTOR RECOMMENDATION ALGORITHM
// ============================================================
// Pure function: given a target job + all jobs + inspector list,
// returns ranked list of inspector recommendations with score & rationale.
//
// Hard filters (eliminate):
//   - inactive, SKP expired, no spec match, schedule conflict
//
// Soft scoring (max 100):
//   Spesialisasi    : 30 (primary match) / 15 (secondary)
//   Workload        : 25 (inverse to active jobs at Stage 3-5)
//   Pengalaman Klien: 15 (history with same client)
//   Pengalaman Pesawat: 15 (history with same pesawat type)
//   Recency         : 15 (days since last field, ≥3 hari = istirahat cukup)
//
// Bonuses/penalties:
//   +5  SKP ≥1 tahun masa berlaku
//   +5  Domisili match wilayah klien
//   +10 Senior level (≥3) untuk job critical (PUBT/PV hydrotest, BOILER)
//   -10 Overload (≥4 job aktif)
//   -15 Riwayat issue dengan klien (kalau ada flag negative_history)

function isCriticalPesawat(pesawatCode) {
  return pesawatCode === 'BOILER' || pesawatCode === 'PV';
}

// Detect if inspector already has scheduled job that overlaps with target dates
function hasScheduleConflict(inspId, inspName, targetTgl, targetDurasi, allJobs, excludeJobId) {
  if (!targetTgl) return false;
  const targetStart = new Date(targetTgl);
  const targetEnd = new Date(targetTgl);
  targetEnd.setDate(targetEnd.getDate() + (Number(targetDurasi) || 1) - 1);

  return allJobs.some(j => {
    if (j.id === excludeJobId) return false;
    if (j.completed_at) return false;
    if (j.stage < 3 || j.stage > 4) return false; // only Stage 3 (scheduled) or 4 (executing)
    if (!j.tgl_pelaksanaan) return false;
    const assigned = (j.inspektur_ids || []).includes(inspId) || (j.inspektur || '').includes(inspName);
    if (!assigned) return false;

    const jStart = new Date(j.tgl_pelaksanaan);
    const jEnd = new Date(j.tgl_pelaksanaan);
    jEnd.setDate(jEnd.getDate() + (Number(j.durasi_hari) || 1) - 1);

    // Overlap if NOT (target ends before j starts) AND NOT (target starts after j ends)
    return !(targetEnd < jStart || targetStart > jEnd);
  });
}

// Try to match domisili (inspector) with client location (city/province) — simple heuristic
function isDomisiliMatch(inspDomisili, klienLokasi) {
  if (!inspDomisili || !klienLokasi) return false;
  const lokasi = klienLokasi.toLowerCase();
  const dom = inspDomisili.toLowerCase();
  // Jabodetabek cluster: Bekasi, Jakarta, Tangerang, Depok, Bogor saling support
  const jabodetabek = ['bekasi', 'jakarta', 'tangerang', 'depok', 'bogor', 'cikampek', 'cikarang', 'cibitung'];
  const inDom = jabodetabek.some(c => dom.includes(c));
  const inLok = jabodetabek.some(c => lokasi.includes(c));
  if (inDom && inLok) return true;
  // Direct city match
  return lokasi.includes(dom) || dom.includes(lokasi.split(',')[0].trim());
}

function recommendInspektur(targetJob, allJobs, inspekturList = INSPEKTUR_LIST) {
  const requiredSpecs = PESAWAT_SPESIALISASI[targetJob.pesawat] || ['Umum'];
  const targetTgl = targetJob.tgl_pelaksanaan;
  const targetDurasi = targetJob.durasi_hari || 1;
  const todayStr = today();

  return inspekturList.map(insp => {
    const breakdown = [];
    const issues = [];

    // === HARD FILTERS ===
    if (!insp.active) {
      return { inspektur: insp, score: -1, qualified: false, reason: 'Tidak aktif', breakdown: [], issues: ['Non-aktif'] };
    }
    const skpDays = daysBetween(todayStr, insp.skp_expired);
    if (skpDays < 0) {
      return { inspektur: insp, score: -1, qualified: false, reason: 'SKP expired', breakdown: [], issues: [`SKP expired ${Math.abs(skpDays)}h lalu`] };
    }
    const specOverlap = insp.spesialisasi.filter(s => requiredSpecs.includes(s));
    if (specOverlap.length === 0) {
      return { inspektur: insp, score: -1, qualified: false, reason: 'Spesialisasi tidak sesuai', breakdown: [], issues: [`Butuh: ${requiredSpecs.join('/')}, punya: ${insp.spesialisasi.join('/')}`] };
    }
    if (targetTgl && hasScheduleConflict(insp.id, insp.nama, targetTgl, targetDurasi, allJobs, targetJob.id)) {
      return { inspektur: insp, score: -1, qualified: false, reason: 'Bentrok jadwal', breakdown: [], issues: ['Sudah ada job lain di tanggal yang sama'] };
    }

    // === SOFT SCORING ===
    let score = 0;

    // 1. Spesialisasi (30) — primary match vs secondary
    const primaryReqSpec = requiredSpecs[0];
    const primaryInspSpec = insp.spesialisasi[0];
    const isPrimaryMatch = primaryInspSpec === primaryReqSpec || insp.spesialisasi.indexOf(primaryReqSpec) === 0;
    const specScore = isPrimaryMatch ? 30 : 15;
    score += specScore;
    breakdown.push({ label: 'Spesialisasi', value: specScore, max: 30, detail: isPrimaryMatch ? `AK3 ${primaryReqSpec} (primary)` : `AK3 ${specOverlap[0]} (secondary)` });

    // 2. Workload (25) — penalize active jobs at Stage 3-5
    const activeJobs = allJobs.filter(j =>
      !j.completed_at && j.stage >= 3 && j.stage <= 5 &&
      ((j.inspektur_ids || []).includes(insp.id) || (j.inspektur || '').includes(insp.nama))
    );
    const workloadCount = activeJobs.length;
    const workloadScore = Math.max(0, 25 - workloadCount * 5);
    score += workloadScore;
    breakdown.push({ label: 'Workload', value: workloadScore, max: 25, detail: `${workloadCount} job aktif` });

    // 3. Pengalaman Klien (15)
    const sameClientJobs = allJobs.filter(j =>
      j.klien === targetJob.klien && j.id !== targetJob.id &&
      ((j.inspektur_ids || []).includes(insp.id) || (j.inspektur || '').includes(insp.nama))
    );
    const clientScore = Math.min(15, sameClientJobs.length * 5);
    score += clientScore;
    if (clientScore > 0) breakdown.push({ label: 'Pengalaman Klien', value: clientScore, max: 15, detail: `${sameClientJobs.length}× kerjakan ${targetJob.klien}` });
    else breakdown.push({ label: 'Pengalaman Klien', value: 0, max: 15, detail: 'Klien baru' });

    // 4. Pengalaman Pesawat (15)
    const samePesawatJobs = allJobs.filter(j =>
      j.pesawat === targetJob.pesawat && j.id !== targetJob.id &&
      ((j.inspektur_ids || []).includes(insp.id) || (j.inspektur || '').includes(insp.nama))
    );
    const pesawatScore = Math.min(15, samePesawatJobs.length * 3);
    score += pesawatScore;
    breakdown.push({ label: 'Pengalaman Pesawat', value: pesawatScore, max: 15, detail: `${samePesawatJobs.length}× ${PESAWAT_TYPES.find(p => p.code === targetJob.pesawat)?.name || targetJob.pesawat}` });

    // 5. Recency (15) — days since last field work
    const completedFieldJobs = allJobs.filter(j =>
      j.stage >= 4 && (j.field_completed_at || (j.stage >= 5)) &&
      ((j.inspektur_ids || []).includes(insp.id) || (j.inspektur || '').includes(insp.nama))
    );
    let recencyScore = 15;
    let recencyDetail = 'Belum pernah lapangan';
    if (completedFieldJobs.length > 0) {
      const lastDates = completedFieldJobs.map(j => j.field_completed_at || j.stage_started_at).filter(Boolean).sort();
      const lastDate = lastDates[lastDates.length - 1];
      const daysSince = daysBetween(lastDate, todayStr);
      recencyScore = Math.min(15, Math.max(0, daysSince * 5));
      recencyDetail = `${daysSince} hari sejak job terakhir`;
    }
    score += recencyScore;
    breakdown.push({ label: 'Availability', value: recencyScore, max: 15, detail: recencyDetail });

    // === BONUSES & PENALTIES ===
    const bonuses = [];

    // SKP berlaku ≥1 tahun
    if (skpDays >= 365) {
      score += 5;
      bonuses.push({ label: '+5 SKP berlaku >1 thn', positive: true });
    } else if (skpDays >= 90 && skpDays < 365) {
      bonuses.push({ label: `⚠ SKP expire ${skpDays}h lagi`, positive: false });
    }

    // Domisili match
    if (isDomisiliMatch(insp.domisili, targetJob.lokasi)) {
      score += 5;
      bonuses.push({ label: `+5 Domisili ${insp.domisili}`, positive: true });
    }

    // Senior level untuk critical job
    if (isCriticalPesawat(targetJob.pesawat) && insp.senior_level >= 3) {
      score += 10;
      bonuses.push({ label: `+10 Senior (${insp.senior_level} thn) untuk pesawat critical`, positive: true });
    } else if (isCriticalPesawat(targetJob.pesawat) && insp.senior_level < 3) {
      score -= 5;
      bonuses.push({ label: `-5 Junior untuk pesawat critical`, positive: false });
    }

    // Overload penalty
    if (workloadCount >= 4) {
      score -= 10;
      bonuses.push({ label: '-10 Overload (≥4 job)', positive: false });
    }

    // Clamp 0-100+
    const finalScore = Math.max(0, score);

    return {
      inspektur: insp,
      score: finalScore,
      qualified: true,
      breakdown,
      bonuses,
      issues,
      // metadata for UI
      workloadCount,
      sameClientCount: sameClientJobs.length,
      samePesawatCount: samePesawatJobs.length,
    };
  })
  .sort((a, b) => b.score - a.score); // highest first
}

// ============================================================
// STORAGE LAYER
// ============================================================

async function safeGet(key) {
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}
async function safeSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val)); return true; }
  catch { return false; }
}
async function safeDelete(key) {
  try { await window.storage.delete(key); return true; }
  catch { return false; }
}
async function safeList(prefix) {
  try {
    const r = await window.storage.list(prefix);
    return r?.keys || [];
  } catch { return []; }
}

async function loadAllJobs() {
  const keys = await safeList('job:');
  const jobs = await Promise.all(keys.map(k => safeGet(k)));
  return jobs.filter(Boolean).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

async function saveJob(job) {
  return safeSet(`job:${job.id}`, job);
}

async function deleteJob(id) {
  return safeDelete(`job:${id}`);
}

async function getNextSeq() {
  const state = await safeGet('app:seq');
  const next = (state?.value || 0) + 1;
  await safeSet('app:seq', { value: next });
  return next;
}

async function seedDemoData() {
  const existing = await safeList('job:');
  if (existing.length > 0) return false;
  const demos = buildDemoJobs();
  for (const j of demos) {
    await saveJob(j);
  }
  await safeSet('app:seq', { value: 8 });
  return true;
}

async function clearAllData() {
  const keys = await safeList('');
  for (const k of keys) await safeDelete(k);
}

const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg:          #F2EFE8;
  --bg-card:    #FBF9F4;
  --bg-deep:    #E8E4DA;
  --ink:        #1A1815;
  --ink-soft:   #5A554B;
  --ink-faint:  #8A8478;
  --line:       #1A1815;
  --line-soft:  #C8C2B3;
  --accent:     #C2410C;
  --accent-deep:#9A330A;
  --ok:         #15803D;
  --warn:       #B45309;
  --bad:        #991B1B;
  --slate:      #44403C;
  --info:       #1E3A8A;
}

* { box-sizing: border-box; }
body, html, #root { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Geist', system-ui, sans-serif; }

.dnp-root { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Geist', system-ui, sans-serif; }
.dnp-serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'ss01'; letter-spacing: -0.01em; }
.dnp-mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'cv11', 'ss01'; }

/* Background texture */
.dnp-bg-texture {
  background-image:
    radial-gradient(circle at 1px 1px, rgba(26,24,21,0.04) 1px, transparent 0);
  background-size: 24px 24px;
}

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--line); background: var(--bg-card); color: var(--ink); font-family: 'Geist', sans-serif; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.15s; border-radius: 0; letter-spacing: -0.005em; }
.btn:hover { background: var(--ink); color: var(--bg-card); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent-deep); }
.btn-primary:hover { background: var(--accent-deep); color: white; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg-deep); color: var(--ink); }
.btn-sm { padding: 4px 8px; font-size: 12px; gap: 4px; }
.btn-danger { color: var(--bad); border-color: var(--bad); }
.btn-danger:hover { background: var(--bad); color: white; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: var(--bg-card); color: var(--ink); }

/* Inputs */
.inp { width: 100%; padding: 8px 12px; border: 1px solid var(--line); background: var(--bg-card); font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); border-radius: 0; outline: none; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(194, 65, 12, 0.15); }
.inp-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); font-weight: 600; margin-bottom: 4px; display: block; }

/* Cards & panels */
.panel { background: var(--bg-card); border: 1px solid var(--line); }
.panel-soft { background: var(--bg-card); border: 1px solid var(--line-soft); }
.divider { border-top: 1px solid var(--line); }
.divider-soft { border-top: 1px solid var(--line-soft); }

/* Tags & chips */
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border: 1px solid currentColor; background: rgba(255,255,255,0.5); }
.tag-ok { color: var(--ok); }
.tag-warn { color: var(--warn); background: rgba(180,83,9,0.08); }
.tag-bad { color: var(--bad); background: rgba(153,27,27,0.08); }
.tag-info { color: var(--info); }
.tag-slate { color: var(--slate); }
.tag-accent { color: var(--accent); }

/* Stage pill */
.stage-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; background: var(--bg-deep); border: 1px solid var(--line); color: var(--ink); letter-spacing: 0.03em; }

/* Hover-able rows */
.row-hover:hover { background: var(--bg-deep); cursor: pointer; }

/* Kanban */
.kanban-col { background: var(--bg-deep); border: 1px solid var(--line); min-width: 280px; max-width: 280px; flex-shrink: 0; }
.kanban-card { background: var(--bg-card); border: 1px solid var(--line); padding: 12px; cursor: pointer; transition: all 0.12s; }
.kanban-card:hover { background: var(--ink); color: var(--bg-card); transform: translateY(-1px); }
.kanban-card:hover .kanban-card-meta { color: var(--bg-card); opacity: 0.7; }

/* Timeline */
.timeline-node { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line); background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.timeline-node.done { background: var(--ink); color: var(--bg-card); }
.timeline-node.active { background: var(--accent); color: white; border-color: var(--accent-deep); }
.timeline-line { width: 2px; background: var(--line); flex: 1; min-height: 24px; }
.timeline-line.done { background: var(--ink); }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(26,24,21,0.6); z-index: 50; display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
.modal-content { background: var(--bg-card); border: 1px solid var(--line); width: 100%; max-width: 900px; max-height: calc(100vh - 80px); display: flex; flex-direction: column; }

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line-soft); border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }

/* Animations */
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fadein { animation: fadein 0.25s ease-out; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }

/* Login screen */
.login-grid { background-image:
  linear-gradient(var(--line-soft) 1px, transparent 1px),
  linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: -1px -1px;
}
`;

// ============================================================
// SMALL COMPONENTS
// ============================================================

function StatusTag({ status, children }) {
  const cls = {
    on_track: 'tag-ok',
    warning: 'tag-warn',
    overdue: 'tag-bad',
    completed: 'tag-info',
    expired: 'tag-bad',
    expiring_soon: 'tag-warn',
    valid: 'tag-ok',
  }[status] || 'tag-slate';
  return <span className={`tag ${cls}`}>{children}</span>;
}

function StagePill({ stage }) {
  const s = STAGES.find(x => x.id === stage);
  if (!s) return null;
  return (
    <span className="stage-pill">
      <span className="dnp-mono" style={{ opacity: 0.5 }}>{String(stage).padStart(2,'0')}</span>
      {s.name}
    </span>
  );
}

function KPICard({ label, value, sub, icon: Icon, accent }) {
  return (
    <div className="panel" style={{ padding: 20, position: 'relative' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 8 }}>{label}</div>
          <div className="dnp-serif" style={{ fontSize: 36, fontWeight: 500, lineHeight: 1, color: accent || 'var(--ink)' }}>{value}</div>
          {sub && <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 6 }}>{sub}</div>}
        </div>
        {Icon && <Icon size={20} strokeWidth={1.5} style={{ color: 'var(--ink-faint)' }} />}
      </div>
    </div>
  );
}

    onLogin({ name: name.trim(), role });
  };

  return (
    <div className="dnp-root login-grid" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div className="panel fadein" style={{ width: '100%', maxWidth: 560, padding: 40 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 28 }}>
          <div style={{ width: 44, height: 44, background: 'var(--ink)', color: 'var(--bg-card)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <HardHat size={22} strokeWidth={1.5} />
          </div>
          <div>
            <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>PT Delta Nusantara Persada</div>
            <div className="dnp-serif" style={{ fontSize: 22, fontWeight: 500, lineHeight: 1.1 }}>Sistem Monitoring Riksa Uji</div>
          </div>
        </div>

        <div className="divider-soft" style={{ marginBottom: 24 }} />

        <div style={{ marginBottom: 16 }}>
          <label className="inp-label">Nama Anda</label>
          <input className="inp" value={name} onChange={e => setName(e.target.value)} placeholder="Masukkan nama lengkap" />
          <div style={{ fontSize: 10, color: 'var(--ink-faint)', marginTop: 6, lineHeight: 1.6 }}>
            <strong>Demo users:</strong> {' '}
            <button onClick={() => { setName('Terzha R. Perdanawan'); setRole('manager'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Terzha (MGR)</button> · {' '}
            <button onClick={() => { setName('Andini Sari'); setRole('marketing'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Andini (MKT)</button> · {' '}
            <button onClick={() => { setName('Rendi Pratama'); setRole('inspektur'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Rendi (INS)</button> · {' '}
            <button onClick={() => { setName('Sri Mulyani'); setRole('inspektur'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Sri (INS)</button> · {' '}
            <button onClick={() => { setName('Budi Susanto'); setRole('admin'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Budi (ADM)</button> · {' '}
            <button onClick={() => { setName('Putri Wahyuni'); setRole('finance'); }} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontFamily: 'inherit', fontSize: 'inherit', textDecoration: 'underline' }}>Putri (FIN)</button>
          </div>
        </div>

        <div style={{ marginBottom: 28 }}>
          <label className="inp-label">Pilih Role / Posisi</label>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 4 }}>
            {Object.entries(ROLES).map(([key, r]) => (
              <button key={key} onClick={() => setRole(key)}
                className="btn"
                style={{
                  padding: '12px 14px',
                  flexDirection: 'column',
                  alignItems: 'flex-start',
                  gap: 4,
                  background: role === key ? 'var(--ink)' : 'var(--bg-card)',
                  color: role === key ? 'var(--bg-card)' : 'var(--ink)',
                  textAlign: 'left'
                }}>
                <span style={{ fontSize: 11, opacity: 0.6, fontFamily: 'JetBrains Mono, monospace' }}>{r.label}</span>
                <span style={{ fontWeight: 600 }}>{r.name}</span>
                <span style={{ fontSize: 11, opacity: 0.7, fontWeight: 400 }}>{r.tagline}</span>
              </button>
            ))}
          </div>
        </div>

        <button className="btn btn-primary" onClick={submit} style={{ width: '100%', justifyContent: 'center', padding: '12px' }}>
          Masuk Sistem <ArrowRight size={16} />
        </button>

        <div style={{ marginTop: 20, fontSize: 11, color: 'var(--ink-faint)', lineHeight: 1.6 }}>
          <strong>Prototype Demo:</strong> Data tersimpan lokal di browser Anda. Untuk produksi multi-user, integrasi dengan backend (Supabase/Firebase) diperlukan. Ganti role kapan saja untuk demo workflow.
        </div>
      </div>
    </div>
  );
}

// DASHBOARD - Role-aware with common frame + role sections

function Dashboard({ jobs, user, onSelectJob, setView }) {
  const isMKT = user.role === 'marketing';
  const isINS = user.role === 'inspektur';
  const isADM = user.role === 'admin';
  const isFIN = user.role === 'finance';
  const isMGR = user.role === 'manager';
  const isPersonal = isMKT || isINS;

  // Personal filter toggle (MKT & INS default to "mine")
  const [filterMine, setFilterMine] = useState(isPersonal);

  // MGR/FIN global filters
  const [filterDisnaker, setFilterDisnaker] = useState('all');
  const [filterPesawat, setFilterPesawat] = useState('all');

  // Find inspektur ID for current user
  const myInspekturId = useMemo(() => INSPEKTUR_LIST.find(i => i.nama === user.name)?.id, [user.name]);

  // Step 1: Personal scope filter
  const personalFiltered = useMemo(() => {
    if (!isPersonal || !filterMine) return jobs;
    if (isMKT) return jobs.filter(j => j.owner_marketing === user.name);
    if (isINS) return jobs.filter(j => (j.inspektur_ids || []).includes(myInspekturId) || (j.inspektur || '').includes(user.name));
    return jobs;
  }, [jobs, isPersonal, isMKT, isINS, filterMine, user.name, myInspekturId]);

  // Step 2: Global Disnaker/Pesawat filter (for MGR/FIN)
  const visibleJobs = useMemo(() => {
    let r = personalFiltered;
    if ((isMGR || isFIN) && filterDisnaker !== 'all') r = r.filter(j => j.disnaker_tujuan === filterDisnaker);
    if ((isMGR || isFIN) && filterPesawat !== 'all') r = r.filter(j => j.pesawat === filterPesawat);
    return r;
  }, [personalFiltered, isMGR, isFIN, filterDisnaker, filterPesawat]);

  const stats = useMemo(() => {
    const active = visibleJobs.filter(j => j.stage < 7 || (j.stage === 7 && !j.completed_at));
    const completed = visibleJobs.filter(j => j.stage === 7 && j.completed_at);
    const thisMonth = completed.filter(j => {
      const d = new Date(j.completed_at);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    const overdue = visibleJobs.filter(j => jobStatus(j) === 'overdue');
    const pipeline = active.reduce((sum, j) => sum + (j.nilai || 0), 0);
    const monthRevenue = thisMonth.reduce((sum, j) => sum + (j.nilai || 0), 0);
    const byStage = STAGES.map(s => ({
      stage: s.id, name: s.name, count: visibleJobs.filter(j => j.stage === s.id && !j.completed_at).length
    }));

    // INS-specific
    const lhppJobs = isINS ? visibleJobs.filter(j => j.stage === 5 && (j.peer_review_status === 'draft' || !j.peer_review_status || j.peer_review_status === 'revision'))
      .map(j => {
        const deadlineDays = (j.units || 1) * 3;
        const elapsedDays = daysBetween(j.stage_started_at, today());
        const remainingDays = deadlineDays - elapsedDays;
        return { ...j, deadlineDays, elapsedDays, remainingDays };
      }).sort((a, b) => a.remainingDays - b.remainingDays) : [];

    const stage4Mine = isINS ? visibleJobs.filter(j => j.stage === 4) : [];

    // MGR-specific
    const workloadByInspektur = isMGR ? INSPEKTUR_LIST.map(insp => {
      const activeJobs = visibleJobs.filter(j =>
        !j.completed_at && j.stage >= 4 && j.stage <= 5 &&
        ((j.inspektur_ids || []).includes(insp.id) || (j.inspektur || '').includes(insp.nama))
      );
      return {
        ...insp,
        totalActive: activeJobs.length,
        lapanganCount: activeJobs.filter(j => j.stage === 4).length,
        lhppCount: activeJobs.filter(j => j.stage === 5).length,
        overdueCount: activeJobs.filter(j => jobStatus(j) === 'overdue').length,
      };
    }).sort((a, b) => b.totalActive - a.totalActive) : [];

    // MKT
    let mktStats = null;
    if (isMKT) {
      const target = MARKETING_TARGETS[user.name] || 0;
      const realisasi = thisMonth.reduce((s, j) => s + (j.nilai || 0), 0);
      const funnel = [
        { label: 'Penawaran / Stage 1', stage: 1 },
        { label: 'Verifikasi Dokumen',  stage: 2 },
        { label: 'Penjadwalan',         stage: 3 },
        { label: 'Pelaksanaan + LHPP',  stage: [4, 5] },
        { label: 'Disnaker + Penagihan', stage: [6, 7] },
      ].map(f => {
        const stages = Array.isArray(f.stage) ? f.stage : [f.stage];
        const items = visibleJobs.filter(j => stages.includes(j.stage) && !j.completed_at);
        return { ...f, items, count: items.length, total: items.reduce((s, j) => s + (j.nilai || 0), 0) };
      });
      const expiringSukets = [];
      visibleJobs.forEach(j => {
        if (j.units_tracking) {
          j.units_tracking.forEach(u => {
            if (u.suket_expired_at) {
              const days = daysBetween(today(), u.suket_expired_at);
              if (days >= -30 && days <= 90) expiringSukets.push({ job: j, unit: u, days, kode: `${j.kode}-U${u.unit_no}` });
            }
          });
        }
      });
      expiringSukets.sort((a, b) => a.days - b.days);
      mktStats = { target, realisasi, achievement: target ? Math.round((realisasi / target) * 100) : 0, funnel, expiringSukets };
    }

    // ADM
    let admStats = null;
    if (isADM) {
      const antrianVerifikasi = visibleJobs.filter(j => j.stage === 2);
      const butuhJadwal = visibleJobs.filter(j => j.stage === 3 && !j.no_surat_tugas);
      const h5Pending = visibleJobs.filter(j => {
        if (j.stage !== 3 || j.h5_confirmed) return false;
        if (!j.tgl_pelaksanaan) return false;
        const d = daysBetween(today(), j.tgl_pelaksanaan);
        return d <= 5 && d >= 0;
      });
      const upcomingThisWeek = visibleJobs.filter(j => {
        if (!j.tgl_pelaksanaan) return false;
        const d = daysBetween(today(), j.tgl_pelaksanaan);
        return d >= 0 && d <= 7 && (j.stage === 3 || j.stage === 4);
      }).sort((a, b) => new Date(a.tgl_pelaksanaan) - new Date(b.tgl_pelaksanaan));
      const logistikPending = visibleJobs.filter(j =>
        j.stage === 3 && (!j.no_surat_tugas || !j.alat_ids || j.alat_ids.length === 0)
      );
      admStats = { antrianVerifikasi, butuhJadwal, h5Pending, upcomingThisWeek, logistikPending };
    }

    // FIN
    let finStats = null;
    if (isFIN) {
      const siapTagih = visibleJobs.filter(j => j.stage === 7 && !j.invoice_no && !j.completed_at);
      const piutangBerjalan = visibleJobs.filter(j => j.invoice_no && j.payment_status !== 'paid');
      const piutangOverdue = piutangBerjalan.filter(j => j.payment_due_date && daysBetween(today(), j.payment_due_date) < 0);
      const totalPiutang = piutangBerjalan.reduce((s, j) => s + (j.nilai || 0), 0);
      const totalOverdue = piutangOverdue.reduce((s, j) => s + (j.nilai || 0), 0);
      const arBuckets = { '0-30': [], '31-60': [], '61-90': [], '>90': [] };
      piutangBerjalan.forEach(j => {
        if (!j.invoice_date) return;
        const age = daysBetween(j.invoice_date, today());
        if (age <= 30) arBuckets['0-30'].push(j);
        else if (age <= 60) arBuckets['31-60'].push(j);
        else if (age <= 90) arBuckets['61-90'].push(j);
        else arBuckets['>90'].push(j);
      });
      const tandaTerimaPending = piutangBerjalan.filter(j => j.invoice_no && !j.tanda_terima_kembali);
      finStats = { siapTagih, piutangBerjalan, piutangOverdue, totalPiutang, totalOverdue, arBuckets, tandaTerimaPending };
    }

    // MGR
    let mgrStats = null;
    if (isMGR) {
      const lhppNeedReview = visibleJobs.filter(j => j.stage === 5 && j.peer_review_status === 'submitted');
      const suketDisnaker = visibleJobs.filter(j => j.stage === 6);
      const tidakLaikUnits = [];
      visibleJobs.forEach(j => {
        const evals = j.evaluations || [];
        evals.forEach(u => {
          if (u.status === 'tidak_laik' || u.status === 'laik_bersyarat') {
            tidakLaikUnits.push({
              job: j, unit: u, status: u.status,
              kode: `${j.kode}${u.unit_no ? '-U' + u.unit_no : ''}`,
              recommendation: u.recommendation || u.findings || '',
            });
          }
        });
        // Also check units_tracking for laik_bersyarat
        (j.units_tracking || []).forEach(u => {
          if (u.laik_status === 'laik_bersyarat' || u.laik_status === 'tidak_laik') {
            const exists = tidakLaikUnits.some(x => x.job.id === j.id && x.unit.unit_no === u.unit_no);
            if (!exists) {
              tidakLaikUnits.push({
                job: j, unit: u, status: u.laik_status,
                kode: `${j.kode}-U${u.unit_no}`,
                recommendation: u.notes || '',
              });
            }
          }
        });
      });
      mgrStats = { lhppNeedReview, suketDisnaker, tidakLaikUnits };
    }

    return { active, completed, thisMonth, overdue, pipeline, monthRevenue, byStage, lhppJobs, stage4Mine, workloadByInspektur, mktStats, admStats, finStats, mgrStats };
  }, [visibleJobs, isINS, isMGR, isMKT, isADM, isFIN, user.name]);

  return (
    <div className="fadein" style={{ padding: 24 }}>
      {/* === HEADER === */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 16, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            {isPersonal && filterMine ? 'Personal · ' + user.name : 'Overview'}
          </div>
          <h1 className="dnp-serif" style={{ fontSize: 32, fontWeight: 500, margin: '4px 0 0' }}>
            {isMKT && filterMine ? 'Dashboard Marketing' :
             isINS && filterMine ? 'Tugas Lapangan Saya' :
             isADM ? 'Dashboard Admin' :
             isFIN ? 'Dashboard Keuangan' :
             isMGR ? 'Dashboard Manajerial' :
             'Dashboard'}
          </h1>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {isPersonal && (
            <div style={{ display: 'flex', gap: 0, border: '1px solid var(--line)' }}>
              <button onClick={() => setFilterMine(true)}
                style={{
                  padding: '6px 12px', border: 'none', borderRight: '1px solid var(--line)',
                  background: filterMine ? 'var(--ink)' : 'var(--bg-card)',
                  color: filterMine ? 'var(--bg-card)' : 'var(--ink)',
                  fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'Geist, sans-serif',
                  display: 'flex', alignItems: 'center', gap: 4
                }}><User size={12} /> {isINS ? 'Tugas Saya' : 'Pekerjaan Saya'}</button>
              <button onClick={() => setFilterMine(false)}
                style={{
                  padding: '6px 12px', border: 'none',
                  background: !filterMine ? 'var(--ink)' : 'var(--bg-card)',
                  color: !filterMine ? 'var(--bg-card)' : 'var(--ink)',
                  fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'Geist, sans-serif'
                }}>Semua Job</button>
            </div>
          )}
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontFamily: 'JetBrains Mono, monospace' }}>{new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
        </div>
      </div>

      {/* === GLOBAL FILTERS (MGR & FIN only) === */}
      {(isMGR || isFIN) && (
        <div className="panel-soft" style={{ padding: 12, marginBottom: 20, display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap', background: 'rgba(26,24,21,0.03)' }}>
          <div style={{ fontSize: 11, color: 'var(--ink-soft)', fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Filter Global:</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <label style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Wilayah Disnaker:</label>
            <select className="inp" value={filterDisnaker} onChange={e => setFilterDisnaker(e.target.value)} style={{ padding: '4px 8px', fontSize: 12, minWidth: 180 }}>
              <option value="all">— Semua Wilayah —</option>
              {DISNAKER_LIST.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <label style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Jenis Pesawat:</label>
            <select className="inp" value={filterPesawat} onChange={e => setFilterPesawat(e.target.value)} style={{ padding: '4px 8px', fontSize: 12, minWidth: 220 }}>
              <option value="all">— Semua Pesawat —</option>
              {PESAWAT_TYPES.map(p => <option key={p.code} value={p.code}>{p.name}</option>)}
            </select>
          </div>
          {(filterDisnaker !== 'all' || filterPesawat !== 'all') && (
            <button className="btn btn-sm btn-ghost" onClick={() => { setFilterDisnaker('all'); setFilterPesawat('all'); }} style={{ marginLeft: 'auto' }}>
              <X size={11} /> Reset Filter
            </button>
          )}
          <div style={{ marginLeft: filterDisnaker === 'all' && filterPesawat === 'all' ? 'auto' : 0, fontSize: 11, color: 'var(--ink-soft)' }}>
            {visibleJobs.length} dari {jobs.length} job
          </div>
        </div>
      )}

      {/* === ROLE-SPECIFIC SECTIONS === */}
      {isMKT && <MktDashboard stats={stats} user={user} onSelectJob={onSelectJob} setView={setView} jobs={visibleJobs} filterMine={filterMine} />}
      {isADM && <AdmDashboard stats={stats} onSelectJob={onSelectJob} setView={setView} jobs={visibleJobs} />}
      {isINS && <InsDashboard stats={stats} user={user} onSelectJob={onSelectJob} setView={setView} jobs={visibleJobs} filterMine={filterMine} />}
      {isFIN && <FinDashboard stats={stats} onSelectJob={onSelectJob} jobs={visibleJobs} />}
      {isMGR && <MgrDashboard stats={stats} onSelectJob={onSelectJob} setView={setView} jobs={visibleJobs} />}

      {/* === COMMON: Recent Activity (all roles) === */}
      <div className="panel" style={{ padding: 20, marginTop: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>

            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--ink-soft)', fontWeight: 600 }}>Aktivitas Terbaru</div>
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500, marginTop: 2 }}>Recent Activity</div>
          </div>
        </div>
        {(() => {
          const all = [];
          visibleJobs.forEach(j => (j.history || []).slice(-2).forEach(h => all.push({ ...h, job: j })));
          all.sort((a, b) => new Date(b.ts) - new Date(a.ts));
          const list = all.slice(0, 8);
          if (list.length === 0) return <div style={{ fontSize: 13, color: 'var(--ink-soft)', textAlign: 'center', padding: 20 }}>Belum ada aktivitas.</div>;
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {list.map((h, i) => (
                <div key={i} onClick={() => onSelectJob(h.job)} className="row-hover"
                  style={{ display: 'grid', gridTemplateColumns: '90px 70px 1fr 110px', gap: 12, padding: '8px 4px', alignItems: 'center', fontSize: 12 }}>
                  <span className="dnp-mono" style={{ fontWeight: 600 }}>{h.job.kode}</span>
                  <StagePill stage={h.stage} />
                  <span>{h.action}</span>
                  <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--ink-soft)', textAlign: 'right' }}>{formatDate(h.ts)}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// Full Calendar Month View for ADM
function AdmCalendar({ jobs, onSelectJob }) {
  const [refDate, setRefDate] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(null);

  const year = refDate.getFullYear();
  const month = refDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay(); // 0=Sunday
  const daysInMonth = lastDay.getDate();

  // Index inspections by date
  const jobsByDate = useMemo(() => {
    const map = {};
    jobs.forEach(j => {
      if (j.tgl_pelaksanaan && (j.stage === 3 || j.stage === 4)) {
        const d = j.tgl_pelaksanaan;
        if (!map[d]) map[d] = [];
        map[d].push(j);
      }
    });
    return map;
  }, [jobs]);

  const goPrev = () => setRefDate(new Date(year, month - 1, 1));
  const goNext = () => setRefDate(new Date(year, month + 1, 1));
  const goToday = () => { setRefDate(new Date()); setSelectedDate(today()); };

  // Build grid cells
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ date: dateStr, day: d });
  }
  while (cells.length < 42) cells.push(null);

  const monthName = refDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
  const selectedJobs = selectedDate ? (jobsByDate[selectedDate] || []) : [];

  return (
    <div className="panel" style={{ padding: 0, marginBottom: 16 }}>
      <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Kalender Inspeksi Lapangan</div>
          <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>{monthName}</div>
        </div>
        <div style={{ display: 'flex', gap: 4 }}>
          <button className="btn btn-sm btn-ghost" onClick={goPrev}><ChevronLeft size={14} /></button>
          <button className="btn btn-sm" onClick={goToday}>Hari Ini</button>
          <button className="btn btn-sm btn-ghost" onClick={goNext}><ChevronRight size={14} /></button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', background: 'var(--bg-deep)', borderBottom: '1px solid var(--line)' }}>
        {['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'].map((d, i) => (
          <div key={i} style={{ padding: '8px 4px', textAlign: 'center', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', color: i === 0 ? 'var(--bad)' : 'var(--ink-soft)', fontWeight: 600 }}>{d}</div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', borderTop: '1px solid var(--line-soft)' }}>
        {cells.map((cell, i) => {
          if (!cell) return <div key={i} style={{ minHeight: 78, borderRight: i % 7 < 6 ? '1px solid var(--line-soft)' : 'none', borderBottom: '1px solid var(--line-soft)', background: 'var(--bg-deep)' }} />;
          const dayJobs = jobsByDate[cell.date] || [];
          const isToday = cell.date === today();
          const isSelected = cell.date === selectedDate;
          const isSunday = i % 7 === 0;
          return (
            <div key={i} onClick={() => setSelectedDate(cell.date)}
              style={{
                minHeight: 78, padding: 6,
                borderRight: i % 7 < 6 ? '1px solid var(--line-soft)' : 'none',
                borderBottom: '1px solid var(--line-soft)',
                background: isSelected ? 'rgba(194,65,12,0.08)' : isToday ? 'rgba(194,65,12,0.04)' : 'var(--bg-card)',
                cursor: 'pointer', position: 'relative'
              }}>
              <div style={{
                fontSize: 12, fontWeight: isToday ? 700 : 500,
                color: isToday ? 'var(--accent)' : isSunday ? 'var(--bad)' : 'var(--ink)',
                marginBottom: 4
              }}>
                {cell.day}{isToday && <span style={{ fontSize: 9, marginLeft: 4 }}>HARI INI</span>}
              </div>
              {dayJobs.slice(0, 2).map((j, ji) => {
                const pesawat = PESAWAT_TYPES.find(p => p.code === j.pesawat);
                return (
                  <div key={ji} onClick={(e) => { e.stopPropagation(); onSelectJob(j); }}
                    style={{
                      fontSize: 10, padding: '2px 4px', marginBottom: 2,
                      background: j.stage === 4 ? 'var(--accent)' : 'var(--info)',
                      color: 'white', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                      cursor: 'pointer'
                    }}>
                    {j.klien.slice(0, 15)} · {pesawat?.code}
                  </div>
                );
              })}
              {dayJobs.length > 2 && (
                <div style={{ fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600 }}>+ {dayJobs.length - 2} lagi</div>
              )}
            </div>
          );
        })}
      </div>

      {selectedDate && selectedJobs.length > 0 && (
        <div style={{ padding: 16, borderTop: '1px solid var(--line)', background: 'var(--bg-deep)' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink-soft)', textTransform: 'uppercase', marginBottom: 8 }}>
            Detail {formatDate(selectedDate)} · {selectedJobs.length} inspeksi
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {selectedJobs.map(j => {
              const pesawat = PESAWAT_TYPES.find(p => p.code === j.pesawat);
              return (
                <div key={j.id} className="row-hover" onClick={() => onSelectJob(j)}
                  style={{ display: 'grid', gridTemplateColumns: '110px 1fr 1fr 120px 100px', padding: '8px 10px', background: 'var(--bg-card)', alignItems: 'center', fontSize: 12 }}>
                  <span className="dnp-mono" style={{ fontWeight: 600 }}>{j.kode}</span>
                  <span style={{ fontWeight: 500 }}>{j.klien}</span>
                  <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{pesawat?.name} × {j.units}</span>
                  <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace' }}>{j.jam_mulai || '08:00'} · {j.durasi_hari || 1}h</span>
                  <StagePill stage={j.stage} />
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

            Tidak ada job aktif di lapangan / LHPP. Pilih job dari Kanban dulu.
          </div>
        ) : (
          <div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginBottom: 8 }}>
              Foto/BAP akan otomatis tertaut ke job aktif:
            </div>
            <div onClick={() => onSelectJob(activeJob)} className="row-hover" style={{
              padding: 12, background: 'var(--bg-card)', border: '1px solid var(--line-soft)',
              cursor: 'pointer', display: 'grid', gridTemplateColumns: '110px 1fr 120px', gap: 12, alignItems: 'center', marginBottom: 12
            }}>
              <span className="dnp-mono" style={{ fontWeight: 600, fontSize: 13 }}>{activeJob.kode}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{activeJob.klien}</div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{activeJob.lokasi} · {PESAWAT_TYPES.find(p => p.code === activeJob.pesawat)?.name} × {activeJob.units}</div>
              </div>
              <StagePill stage={activeJob.stage} />
            </div>

            {/* Drag-and-drop area */}
            <div onClick={() => fileRef.current?.click()}
              onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.background = 'rgba(194,65,12,0.1)'; }}
              onDragLeave={(e) => { e.currentTarget.style.background = 'var(--bg-card)'; }}
              onDrop={async (e) => {
                e.preventDefault();
                e.currentTarget.style.background = 'var(--bg-card)';
                const files = Array.from(e.dataTransfer.files || []);
                if (files.length === 0) return;
                alert(`Drop ${files.length} file ke job ${activeJob.kode}.\n\nDi prototype ini, klik job → tab Lapangan untuk upload aktual dengan kategori foto. Drag-drop dari dashboard butuh handler khusus yang share state dengan Field Execution Panel.`);
                onSelectJob(activeJob);
              }}
              style={{
                padding: 24, background: 'var(--bg-card)',
                border: '2px dashed var(--accent)', textAlign: 'center', cursor: 'pointer',
                transition: 'background 0.2s'
              }}>
              <Upload size={28} style={{ opacity: 0.6, marginBottom: 6, color: 'var(--accent)' }} />
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Drag & drop foto / BAP di sini</div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>atau klik untuk pilih file · max 10MB/file</div>
              <input ref={fileRef} type="file" multiple style={{ display: 'none' }}
                accept="image/*,application/pdf" capture="environment"
                onChange={() => {
                  alert(`Untuk upload dengan kategori (Foto Nameplate, BAP, dll), klik job → tab Lapangan.\n\nWidget ini shortcut untuk membuka job aktif terbaru Anda.`);
                  onSelectJob(activeJob);
                }} />
            </div>
            <div style={{ fontSize: 10, color: 'var(--ink-faint)', marginTop: 6, lineHeight: 1.5 }}>
              💡 Widget ini shortcut. Setelah klik, Anda akan langsung dibawa ke tab Lapangan job aktif untuk upload dengan kategori (Nameplate / BAP / Pengukuran / dll).
            </div>
          </div>
        )}
      </div>

      {/* LHPP Countdown Timer */}
      {lhppJobs.length > 0 && (
        <div className="panel" style={{ padding: 20, marginBottom: 16, borderColor: lhppJobs.some(j => j.remainingDays < 0) ? 'var(--bad)' : 'var(--accent)', borderWidth: 2 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <Hourglass size={18} style={{ color: 'var(--accent)' }} />
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Countdown Penyusunan LHPP</div>
            <span className="tag tag-accent" style={{ fontSize: 10 }}>{lhppJobs.length} TUGAS</span>
            <div style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--ink-soft)' }}>SOP: 3 hari kerja per unit</div>
          </div>
          {lhppJobs.map((j, i) => {
            const isLate = j.remainingDays < 0;
            const isUrgent = j.remainingDays >= 0 && j.remainingDays <= 1;
            const pesawat = PESAWAT_TYPES.find(p => p.code === j.pesawat);
            return (
              <div key={j.id} onClick={() => onSelectJob(j)} className="row-hover"
                style={{ padding: '12px 8px', borderBottom: i < lhppJobs.length - 1 ? '1px solid var(--line-soft)' : 'none', display: 'grid', gridTemplateColumns: '110px 1fr 140px 120px 100px', gap: 12, alignItems: 'center' }}>
                <span className="dnp-mono" style={{ fontSize: 12, fontWeight: 600 }}>{j.kode}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{j.klien}</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 2 }}>{pesawat?.name} · {j.units} unit · target {j.deadlineDays}h</div>
                </div>
                <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
                  Mulai {formatDate(j.stage_started_at)}<br />
                  <span style={{ fontFamily: 'JetBrains Mono, monospace' }}>Hari ke-{j.elapsedDays}</span>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div className="dnp-serif" style={{ fontSize: 26, fontWeight: 600, color: isLate ? 'var(--bad)' : isUrgent ? 'var(--warn)' : 'var(--ok)', lineHeight: 1 }}>
                    {isLate ? `+${Math.abs(j.remainingDays)}` : j.remainingDays}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 2 }}>
                    {isLate ? 'hari TERLAMBAT' : j.remainingDays === 0 ? 'HARI INI' : 'hari tersisa'}
                  </div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  {j.peer_review_status === 'revision' && <StatusTag status="warning">REVISI</StatusTag>}
                  {isLate && j.peer_review_status !== 'revision' && <StatusTag status="overdue">OVERDUE</StatusTag>}
                  {isUrgent && !isLate && <StatusTag status="warning">URGENT</StatusTag>}
                  {!isLate && !isUrgent && j.peer_review_status !== 'revision' && <StatusTag status="on_track">ON TRACK</StatusTag>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* My To-Do List */}
      {stage4Mine.length > 0 && (
        <div className="panel" style={{ marginBottom: 16 }}>
          <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)' }}>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>My To-Do List</div>
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Job Lapangan Saya</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 1fr 1fr 130px 90px', padding: '10px 20px', background: 'var(--bg-deep)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            <div>Kode</div><div>Klien</div><div>Lokasi & PIC</div><div>Pesawat</div><div>Jadwal</div><div>Aksi</div>
          </div>
          {stage4Mine.map(j => {
            const pesawat = PESAWAT_TYPES.find(p => p.code === j.pesawat);
            return (
              <div key={j.id} className="row-hover" onClick={() => onSelectJob(j)}
                style={{ display: 'grid', gridTemplateColumns: '110px 1fr 1fr 1fr 130px 90px', padding: '12px 20px', borderBottom: '1px solid var(--line-soft)', alignItems: 'center', fontSize: 12 }}>
                <span className="dnp-mono" style={{ fontWeight: 600 }}>{j.kode}</span>
                <span style={{ fontWeight: 500 }}>{j.klien}</span>
                <div>
                  <div style={{ fontSize: 11 }}>{j.lokasi}</div>
                  {j.pic_klien && <div style={{ fontSize: 10, color: 'var(--ink-soft)' }}>PIC: {j.pic_klien}{j.pic_klien_phone && ` · ${j.pic_klien_phone}`}</div>}
                </div>
                <div style={{ fontSize: 11 }}>{pesawat?.name} ({pesawat?.form})<br /><span style={{ color: 'var(--ink-soft)' }}>{j.units} unit</span></div>
                <span className="dnp-mono" style={{ fontSize: 11 }}>{formatDate(j.tgl_pelaksanaan)} · {j.jam_mulai || '08:00'}</span>
                <span style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 600 }}>Lapangan →</span>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

function FinDashboard({ stats, onSelectJob, jobs }) {
  const { finStats } = stats;
  if (!finStats) return null;
  const { siapTagih, piutangBerjalan, piutangOverdue, totalPiutang, totalOverdue, arBuckets, tandaTerimaPending } = finStats;

  return (
    <>
      {/* KPI Strip */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 16 }}>
        <KPICard label="Suket Siap Tagih" value={siapTagih.length} sub="Tahap 7 belum invoice" icon={FileCheck} accent={siapTagih.length > 0 ? 'var(--accent)' : null} />
        <KPICard label="Piutang Berjalan" value={formatRp(totalPiutang)} sub={`${piutangBerjalan.length} invoice unpaid`} icon={Banknote} />
        <KPICard label="Overdue AR" value={formatRp(totalOverdue)} sub={`${piutangOverdue.length} invoice lewat TOP`} icon={AlertTriangle} accent={piutangOverdue.length > 0 ? 'var(--bad)' : null} />
        <KPICard label="Tanda Terima Pending" value={tandaTerimaPending.length} sub="dokumen kurir belum kembali" icon={Package} accent={tandaTerimaPending.length > 0 ? 'var(--warn)' : null} />
      </div>

      {/* AR Aging Chart */}
      <div className="panel" style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>AR Aging Chart</div>
          <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Pengelompokan Piutang Berdasarkan Umur Invoice</div>
        </div>
        {(() => {
          const buckets = [
            { label: '0-30 hari', items: arBuckets['0-30'], color: '#15803D', desc: 'Dalam TOP' },
            { label: '31-60 hari', items: arBuckets['31-60'], color: '#CA8A04', desc: 'Reminder' },
            { label: '61-90 hari', items: arBuckets['61-90'], color: '#D97706', desc: 'Penagihan aktif' },
            { label: '>90 hari', items: arBuckets['>90'], color: '#991B1B', desc: 'Macet — eskalasi' },
          ];
          const maxTotal = Math.max(...buckets.map(b => b.items.reduce((s, j) => s + (j.nilai || 0), 0)), 1);
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {buckets.map((b, i) => {
                const total = b.items.reduce((s, j) => s + (j.nilai || 0), 0);
                const widthPct = (total / maxTotal) * 100;
                return (
                  <div key={i}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, alignItems: 'baseline' }}>
                      <span style={{ fontSize: 13, fontWeight: 600 }}>{b.label}</span>
                      <span style={{ fontSize: 11, color: 'var(--ink-soft)', marginRight: 'auto', marginLeft: 8 }}>· {b.desc}</span>
                      <span className="dnp-mono" style={{ fontSize: 12, fontWeight: 600 }}>{formatRp(total)} <span style={{ color: 'var(--ink-soft)', fontWeight: 400 }}>({b.items.length} invoice)</span></span>
                    </div>
                    <div style={{ height: 24, background: 'var(--bg-deep)', position: 'relative', border: '1px solid var(--line-soft)' }}>
                      <div style={{ width: `${widthPct}%`, height: '100%', background: b.color, transition: 'width 0.6s' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* Tabel Pelacakan Dokumen Kurir */}
      <div className="panel" style={{ marginBottom: 16 }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Pelacakan Dokumen Kurir</div>
          <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Suket & Invoice — Tanda Terima Belum Kembali</div>
        </div>
        {tandaTerimaPending.length === 0 ? (
          <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-soft)', fontSize: 13 }}>
            ✓ Semua dokumen kurir sudah kembali tanda terima.
          </div>
        ) : (
          <>
            <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 130px 100px 130px 110px', padding: '10px 20px', background: 'var(--bg-deep)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
              <div>Kode</div><div>Klien</div><div>No Invoice</div><div>Nilai</div><div>Tgl Invoice</div><div>Hari Lalu</div>
            </div>
            {tandaTerimaPending.map(j => {
              const daysSince = j.invoice_date ? daysBetween(j.invoice_date, today()) : 0;
              return (
                <div key={j.id} className="row-hover" onClick={() => onSelectJob(j)}
                  style={{ display: 'grid', gridTemplateColumns: '110px 1fr 130px 100px 130px 110px', padding: '12px 20px', borderBottom: '1px solid var(--line-soft)', alignItems: 'center', fontSize: 12 }}>
                  <span className="dnp-mono" style={{ fontWeight: 600 }}>{j.kode}</span>
                  <span style={{ fontWeight: 500 }}>{j.klien}</span>
                  <span className="dnp-mono" style={{ fontSize: 11 }}>{j.invoice_no}</span>
                  <span className="dnp-mono" style={{ fontSize: 11 }}>{formatRp(j.nilai)}</span>
                  <span className="dnp-mono" style={{ fontSize: 11 }}>{formatDate(j.invoice_date)}</span>
                  <span style={{ fontSize: 11, fontWeight: 600, color: daysSince > 14 ? 'var(--bad)' : daysSince > 7 ? 'var(--warn)' : 'var(--ink)' }}>
                    {daysSince} hari lalu
                  </span>
                </div>
              );
            })}
          </>
        )}
      </div>

      {/* Overdue AR detail */}
      {piutangOverdue.length > 0 && (
        <div className="panel" style={{ marginBottom: 16, borderColor: 'var(--bad)', borderWidth: 2 }}>
          <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)', background: 'rgba(153,27,27,0.04)' }}>
            <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--bad)', fontWeight: 600 }}>🔴 PIUTANG JATUH TEMPO</div>
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Overdue Accounts Receivable</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 130px 100px 130px 110px', padding: '10px 20px', background: 'var(--bg-deep)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
            <div>Kode</div><div>Klien</div><div>Invoice</div><div>Nilai</div><div>TOP</div><div>Lewat TOP</div>
          </div>
          {piutangOverdue.map(j => {
            const lewat = j.payment_due_date ? daysBetween(j.payment_due_date, today()) : 0;
            return (
              <div key={j.id} className="row-hover" onClick={() => onSelectJob(j)}
                style={{ display: 'grid', gridTemplateColumns: '110px 1fr 130px 100px 130px 110px', padding: '12px 20px', borderBottom: '1px solid var(--line-soft)', alignItems: 'center', fontSize: 12, background: 'rgba(153,27,27,0.02)' }}>
                <span className="dnp-mono" style={{ fontWeight: 600 }}>{j.kode}</span>
                <span style={{ fontWeight: 500 }}>{j.klien}</span>
                <span className="dnp-mono" style={{ fontSize: 11 }}>{j.invoice_no}</span>
                <span className="dnp-mono" style={{ fontSize: 11 }}>{formatRp(j.nilai)}</span>
                <span className="dnp-mono" style={{ fontSize: 11 }}>{formatDate(j.payment_due_date)}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--bad)' }}>+{lewat} hari</span>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

// ============================================================
// MGR DASHBOARD
// ============================================================
function MgrDashboard({ stats, onSelectJob, setView, jobs }) {
  const { mgrStats } = stats;
  if (!mgrStats) return null;
  const { lhppNeedReview, suketDisnaker, tidakLaikUnits } = mgrStats;

  return (
    <>
      {/* KPI Strip */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 16 }}>
        <KPICard label="Total Pipeline" value={formatRp(stats.pipeline)} sub={`${stats.active.length} job aktif`} icon={Banknote} />
        <KPICard label="Total Overdue" value={stats.overdue.length} sub="job lewat SLA" icon={AlertTriangle} accent={stats.overdue.length > 0 ? 'var(--bad)' : null} />
        <KPICard label="LHPP Butuh Review" value={lhppNeedReview.length} sub="menunggu peer review" icon={Eye} accent={lhppNeedReview.length > 0 ? 'var(--accent)' : null} />
        <KPICard label="Suket Berproses" value={suketDisnaker.length} sub="di Disnaker (1-2 bulan)" icon={Building2} />
      </div>

      {/* Bottleneck Locator - Beban Kerja Lintas Divisi */}
      <div className="panel" style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Bottleneck Locator</div>
          <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Beban Kerja Lintas Tahapan</div>
        </div>
        {(() => {
          const max = Math.max(...stats.byStage.map(x => x.count), 1);
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {stats.byStage.map(s => {
                const w = (s.count / max) * 100;
                const isBottleneck = s.count >= 3 && s.count === max;
                return (
                  <div key={s.stage} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 30, fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--ink-soft)', flexShrink: 0 }}>0{s.stage}</div>
                    <div style={{ width: 180, fontSize: 12, fontWeight: 500 }}>{s.name}</div>
                    <div style={{ flex: 1, height: 22, background: 'var(--bg-deep)', position: 'relative', border: '1px solid var(--line-soft)' }}>
                      <div style={{
                        width: `${w}%`, height: '100%',
                        background: isBottleneck ? 'var(--bad)' : 'var(--ink)',
                        display: 'flex', alignItems: 'center', justifyContent: 'flex-end', paddingRight: 8,
                        color: 'white', fontSize: 11, fontWeight: 600, transition: 'width 0.6s'
                      }}>
                        {s.count > 0 ? s.count : ''}
                      </div>
                    </div>
                    {isBottleneck && <span className="tag tag-bad" style={{ fontSize: 10 }}>🚨 BOTTLENECK</span>}
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* Workload per Inspektur */}
      {stats.workloadByInspektur.length > 0 && (
        <div className="panel" style={{ padding: 20, marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <HardHat size={18} style={{ color: 'var(--ink-soft)' }} />
            <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Beban Kerja Tim Inspektur</div>
            <div style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--ink-soft)' }}>Stage 4–5</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
            {stats.workloadByInspektur.map(insp => {
              const max = Math.max(...stats.workloadByInspektur.map(x => x.totalActive), 1);
              const widthPct = (insp.totalActive / max) * 100;
              const isOverloaded = insp.totalActive >= 3;
              const isIdle = insp.totalActive === 0;
              return (
                <div key={insp.id} style={{ padding: 12, border: '1px solid ' + (isOverloaded ? 'var(--bad)' : 'var(--line-soft)'), background: 'var(--bg-card)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{insp.nama}</div>
                      <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 2 }}>{insp.spesialisasi.map(s => 'AK3 ' + s).join(', ')}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div className="dnp-serif" style={{ fontSize: 22, fontWeight: 600, color: isOverloaded ? 'var(--bad)' : isIdle ? 'var(--ink-faint)' : 'var(--ink)', lineHeight: 1 }}>{insp.totalActive}</div>
                      <div style={{ fontSize: 9, color: 'var(--ink-soft)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>aktif</div>
                    </div>
                  </div>
                  <div style={{ height: 6, background: 'var(--bg-deep)', position: 'relative', marginTop: 8, border: '1px solid var(--line-soft)' }}>
                    <div style={{ width: `${widthPct}%`, height: '100%', background: isOverloaded ? 'var(--bad)' : 'var(--ink)' }} />
                  </div>
                  <div style={{ display: 'flex', gap: 8, marginTop: 8, fontSize: 11 }}>
                    {insp.lapanganCount > 0 && <span style={{ color: 'var(--ink-soft)' }}>🏗 {insp.lapanganCount} Lap</span>}
                    {insp.lhppCount > 0 && <span style={{ color: 'var(--ink-soft)' }}>📝 {insp.lhppCount} LHPP</span>}
                    {insp.overdueCount > 0 && <span style={{ color: 'var(--bad)', fontWeight: 600 }}>⚠ {insp.overdueCount} OVERDUE</span>}
                    {isIdle && <span style={{ color: 'var(--ok)', fontStyle: 'italic' }}>✓ tersedia</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Tabel TIDAK LAIK */}
      <div className="panel" style={{ marginBottom: 16 }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>Temuan Kendala Lapangan</div>
          <div className="dnp-serif" style={{ fontSize: 18, fontWeight: 500 }}>Unit "TIDAK LAIK" / "LAIK BERSYARAT" — Perlu Rekomendasi Perbaikan</div>
        </div>
        {tidakLaikUnits.length === 0 ? (
          <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-soft)', fontSize: 13 }}>
            ✓ Tidak ada unit dengan kategori TIDAK LAIK / LAIK BERSYARAT saat ini.
          </div>
        ) : (
          <>
            <div style={{ display: 'grid', gridTemplateColumns: '130px 1fr 1fr 140px 2fr', padding: '10px 20px', background: 'var(--bg-deep)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-soft)', fontWeight: 600 }}>
              <div>Kode-Unit</div><div>Klien</div><div>Unit</div><div>Status</div><div>Catatan / Rekomendasi</div>
            </div>
            {tidakLaikUnits.map((t, i) => {
              const opt = LAIK_STATUS.find(o => o.value === t.status);
              return (
                <div key={i} className="row-hover" onClick={() => onSelectJob(t.job)}
                  style={{ display: 'grid', gridTemplateColumns: '130px 1fr 1fr 140px 2fr', padding: '12px 20px', borderBottom: '1px solid var(--line-soft)', alignItems: 'center', fontSize: 12 }}>
                  <span className="dnp-mono" style={{ fontWeight: 600 }}>{t.kode}</span>
                  <span style={{ fontWeight: 500 }}>{t.job.klien}</span>
                  <span style={{ fontSize: 11 }}>{t.unit.unit_label || `Unit ${t.unit.unit_no}`}</span>
                  <span>{opt && <span className={`tag ${opt.tag}`} style={{ fontSize: 10 }}>{opt.label}</span>}</span>
                  <span style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{t.recommendation || '—'}</span>
                </div>
              );
            })}
          </>
        )}
      </div>
    </>
  );
}
